name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Drift guard (sync_check)
        run: python3 tools/sync_check.py

      - name: Validate eval files
        run: |
          python3 - <<'PY'
          import json, glob, sys
          bad = []
          for f in glob.glob("skills/**/evals/evals.json", recursive=True):
              try:
                  json.load(open(f))
              except Exception as e:
                  bad.append(f"{f}: {e}")
          if bad:
              print("\n".join(bad)); sys.exit(1)
          print("all eval files valid")
          PY

      - name: Package all skills (validates every skill is installable)
        run: python3 tools/package_skill.py --all

      - name: Skill-health gate (block on any blocking issue)
        run: |
          python3 - <<'PY'
          import json, subprocess, sys
          rep = json.loads(subprocess.check_output(["python3", "shared/health/health.py", "--scan"]))
          print(f"readiness {rep['readiness_score']}/100 ({rep['readiness_band']}); "
                f"blocking={len(rep['blocking_issues'])}")
          if rep["blocking_issues"]:
              print("\n".join(rep["blocking_issues"])); sys.exit(1)
          PY

      - name: Version consistency (versions.json == VERSION == plugin; skills match)
        run: python3 tools/version.py --check

      - name: Validate committed example artifacts (output-validator)
        run: python3 tools/validate_examples.py

      - name: Registry currency (informational drift report)
        run: python3 tools/registry_currency.py --summary || true
      # Phase A+: add eval smoke tests here (skill triggering + Quality Gates pass).

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install scanners
        run: pip install pip-audit bandit
      - name: Dependency + code security scan (gate)
        run: python3 tools/security_scan.py
