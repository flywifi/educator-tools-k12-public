name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  drift-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Drift guard (sync_check)
        run: python3 tools/sync_check.py
      # Phase A+: add eval smoke tests here (skill triggering + Quality Gates pass).
