# TOS Skill: atom-misconception
# Platform: OpenAI Function Calling
# Format: OpenAI API tools[] item
#
# ATOM SKILL — single operation, minimal token footprint.

type: function
function:
  name: misconception
  description: |
    Identify 2-5 common student misconceptions for a given topic, grade, and subject. For each
    misconception, explains WHY it occurs (cognitive origin or prior knowledge conflict) and
    provides a specific instructional remedy — an activity, question, or approach that directly
    addresses the misconception.

    Research-grounded: misconceptions draw from known literature in math/science education
    research, cognitive load theory, and documented common errors in FL assessment data. Not
    fabricated — when a misconception is inferred rather than documented, it is flagged as
    "commonly observed" rather than "research-documented."

    Called by: lesson-planner (embeds misconception awareness in the lesson), assessment-designer
    (informs distractor design for MC questions), atom-assessment-item (when generating
    distractors), and atom-activity-generate (builds activities that proactively address errors).

    Trigger phrases: "what misconceptions do students have about", "common mistakes on",
    "why do students struggle with", "what errors do students make on", "misconceptions for",
    "common student errors in", "what do kids get wrong about".

    Do NOT use atom-misconception to diagnose an individual student's specific misconception
    (that requires looking at the student's actual work). This skill returns COMMON misconceptions
    for a topic at a grade level, not individual student assessment. human_review_required: true.
  parameters:
    type: object
    required:
      - topic
      - grade
      - subject
    properties:
      topic:
        type: string
        description: >
          The concept or skill to surface misconceptions for. Be specific for best results.
          Examples: "multiplying fractions by whole numbers" (better than just "fractions"),
          "inferring author's purpose" (better than just "reading"), "photosynthesis vs.
          respiration" (better than just "cell processes").
      grade:
        type: string
        description: >
          Grade level. Examples: "4th grade", "7th grade", "10th grade". More specific =
          better-calibrated misconceptions for the developmental level.
      subject:
        type: string
        description: >
          Subject area. Examples: "Mathematics", "ELA", "Science", "Social Studies".
      count:
        type: integer
        description: >
          Number of misconceptions to return. Range: 2-5. Defaults to 3. Use 2 for a quick
          check; 5 when doing thorough lesson prep or assessment design.
      standard:
        type: string
        description: >
          Florida B.E.S.T. or NGSSS standard code if you want misconceptions scoped to a
          specific standard's demands. Optional — inferred from topic/grade/subject if omitted.
      include_instructional_remedy:
        type: boolean
        description: >
          If true (default), include a specific instructional remedy for each misconception —
          an activity, question sequence, or instructional approach that directly addresses it.
      include_assessment_probes:
        type: boolean
        description: >
          If true, include a diagnostic question or prompt (an "assessment probe") that can
          elicit each misconception for formative monitoring. These are different from remedies —
          they help the teacher DETECT the misconception, not fix it. Defaults to false.
      source_type:
        type: string
        enum:
          - research_documented
          - commonly_observed
          - both
        description: >
          Filter misconceptions by evidence base. research_documented returns only misconceptions
          with documented research citations. commonly_observed includes teacher-reported and
          assessment-data-inferred patterns. Defaults to both.
    additionalProperties: false
