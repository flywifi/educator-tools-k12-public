- type: function
  function:
    name: skill_health
    description: "Diagnose and audit the TOS ecosystem itself. Sweeps every skill\
      \ (MAINTAINER.md, synced\nreferences, evals, routing membership), shared engines\
      \ (importable), and routing integrity.\nReads the audit trail (Quality Ledger,\
      \ runtime traces, minority reports) to surface recurring\nfailure patterns.\
      \ Produces human-readable repair plans the teacher/developer reviews and\napproves\
      \ — nothing high-stakes is auto-applied.\n\nTrigger phrases: \"is the ecosystem\
      \ healthy\", \"why did this skill fail\", \"audit the skills\",\n\"diagnose\
      \ the environment\", \"what needs updating for the new skill\", \"repair plan\"\
      ,\n\"check drift\", \"run health check\", \"what's broken\", \"scan all skills\"\
      , \"impact analysis\nfor renaming a skill\", \"tos_check\".\n\nGoverns the SYSTEM,\
      \ not classroom artifacts. Engine: shared/health/health.py (offline,\nstdlib);\
      \ orchestrator: tools/tos_check.py (runs all diagnostic tools and writes\ntos_report.json\
      \ + tos_report.md).\n\nFive capabilities:\n1. Scan readiness — sweep every skill\
      \ + shared engine + routing; emit readiness score,\n   blocking issues, and\
      \ release-gate recommendation\n2. Diagnose — read ledger/ledger.json + traces;\
      \ surface recurring problems in plain language\n   (connector failures, minority\
      \ reports, validation failures)\n3. Impact analysis — when a skill is added/renamed,\
      \ list every ecosystem file that must\n   update (routing.json, ROUTING_MODEL.md,\
      \ routing-map.md, STATE.md, METRICS.md,\n   artifact-types.json)\n4. Repair\
      \ plan — ordered severity-tagged plan (mechanical vs. judgment); you edit or\
      \ approve\n5. Validate outputs — artifact JSON schema check + governance / no-fabrication\
      \ / no-real-PII\n   rule catalog before the artifact ships\n\nDo NOT use skill-health\
      \ to author lessons, assessments, or IEP documents (wrong skill).\nDo NOT use\
      \ it to score classroom artifacts (use quality-review). human_review_required:\
      \ true\non all reports and repair plans.\n"
    parameters:
      type: object
      required:
      - action
      properties:
        action:
          type: string
          enum:
          - summary
          - impact_analysis
          - diagnose
          - validate_artifact
          - full_tos_check
          description: 'Action to perform. summary: sweep all skills + engines + routing;
            return readiness score and blocking issues. Equivalent to shared/health/health.py
            --summary. impact_analysis: for a named skill being added or renamed,
            list every ecosystem file that must change. Equivalent to health.py --impact
            <skill_name>. diagnose: read the audit trail (ledger, traces) and surface
            recurring failure patterns in plain language. Produces a diagnosis document.
            validate_artifact: check a specific artifact against its schema + governance
            rules (calls tools/validate_outputs.py). Returns violations and corrective
            actions. full_tos_check: run tools/tos_check.py — all 10 diagnostic groups
            (drift, version, caps, render, feeds, cache, seeds, registry, sources,
            security) and write tos_report.json + tos_report.md.

            '
        skill_name:
          type: string
          description: 'For impact_analysis: the skill being added, renamed, or removed.
            Examples: "lesson-planner", "atom-standards-match", "my-new-skill".

            '
        traces_dir:
          type: string
          description: 'For diagnose: directory containing saved runtime execution
            traces. Defaults to runtime/traces if it exists.

            '
        artifact:
          type: string
          description: 'For validate_artifact: the artifact JSON string to validate.

            '
        artifact_schema:
          type: string
          enum:
          - lesson_plan
          - assessment
          - iep_goal
          - accommodation_plan
          - pacing_guide
          - curriculum_map
          - parent_communication
          - health_report
          - repair_plan
          - generic
          description: 'For validate_artifact: schema to validate against.

            '
        tos_check_groups:
          type: array
          items:
            type: string
            enum:
            - drift
            - version
            - caps
            - render
            - feeds
            - cache
            - seeds
            - registry
            - sources
            - security
          description: 'For full_tos_check: specific check groups to run. If omitted,
            all 10 groups run.

            '
        tos_check_timeout:
          type: integer
          description: 'For full_tos_check: per-check timeout in seconds. Defaults
            to 30.

            '
        out_dir:
          type: string
          description: 'For full_tos_check: directory to write tos_report.json and
            tos_report.md. If omitted, results are returned inline.

            '
      additionalProperties: false
- type: function
  function:
    name: skill_repair
    description: 'Apply an approved skill-health repair plan with the smallest durable
      change. Separates

      mechanical fixes (safe to automate) from judgment fixes (always human-only).
      Shows a

      plain-language approval summary before applying anything. On approval, applies
      ONLY safe

      mechanical fixes, then re-runs the drift guard (tools/sync_check.py).


      Trigger phrases: "apply the repair plan", "fix the broken skill", "patch this
      skill",

      "run the approved fixes", "apply mechanical fixes", "skill repair dry run",
      "what would

      the repair change", "execute the approved patch".


      Workflow (patch-principles.md):

      1. Confirm basis — prefer approved plan from skill-health; if none, produce
      diagnosis + stop

      2. Prepare — read full skill; identify only files that truly need changes; snapshot
      before edit

      3. Patch minimally — mechanical (safe, automate) vs. judgment (human-only);
      fix root cause

      4. Validate — re-run sync_check.py, re-read changed files; call out anything
      untestable

      5. Summarize for approval — plain language: what changed, why, what stayed,
      any risk


      Dry-run by default: shows what would change. --apply performs ONLY safe mechanical
      fixes.

      Judgment items (architectural changes, logic rewrites, new skill design) always
      stay human.


      Never presents a patch as complete if risky parts could not be validated. If
      the real problem

      is broad architectural drift, says so and recommends a larger refactor — does
      not hide it.


      Do NOT use skill-repair to diagnose issues (use skill-health first). Do NOT
      use it to

      redesign a skill from scratch. Do NOT use it to make judgment calls about which
      approach

      is architecturally correct — those belong with the human developer.

      human_review_required: true on all output.

      '
    parameters:
      type: object
      required:
      - action
      properties:
        action:
          type: string
          enum:
          - dry_run
          - apply
          - summarize_plan
          description: 'Action to perform. dry_run (default): show exactly what would
            change, which items are mechanical vs. judgment, and the risk assessment
            — but change nothing. apply: perform ONLY the safe mechanical fixes from
            the approved plan; judgment items stay as a TODO list for the human. Re-runs
            sync_check.py after. summarize_plan: parse a repair plan and produce a
            plain-language approval summary without running any fixes.

            '
        repair_plan:
          type: string
          description: 'The repair plan to execute. Accepts either: (a) a JSON repair
            plan object produced by skill-health''s diagnose action, or (b) a path
            to a saved repair plan file (e.g. "reports/repair-plan-2026-06-27.json"),
            or (c) a plain-text description of what needs to be fixed (skill-repair
            will parse it into mechanical vs. judgment items and stop for your confirmation
            before proceeding).

            '
        skill_name:
          type: string
          description: 'The specific skill to repair (e.g. "lesson-planner", "atom-standards-match").
            When provided alongside a repair plan, validates that the plan targets
            the correct skill before applying any changes.

            '
        confirmation_acknowledged:
          type: boolean
          description: 'For apply action: must be true to proceed with changes. Acts
            as an explicit acknowledgment that the human has reviewed the dry_run
            output and approved it. apply will refuse to run without this set to true.

            '
        snapshot_before:
          type: boolean
          description: 'If true, save a snapshot of all target files before applying
            any changes. Snapshots go to ledger/repair-snapshots/<timestamp>/. Defaults
            to true for apply action.

            '
        stop_on_first_failure:
          type: boolean
          description: 'If true, halt the apply run if any mechanical fix fails validation
            after application. Defaults to true (safer; prevents cascading partial
            repairs).

            '
      additionalProperties: false
- type: function
  function:
    name: special_education_support
    description: 'Generate IDEA-compliant IEP goal drafts, accommodation and modification
      plans, behavior

      support plans, transition planning documents, and progress notes for K-12 special
      education

      professionals. Every output cites the relevant legal basis (IDEA §300, ADA,
      Section 504).

      All outputs are DRAFTS for qualified professionals to review, edit, and approve
      — never final

      documents.


      Trigger phrases: "write an IEP goal for", "draft accommodations for", "create
      a behavior

      support plan", "help with transition planning", "write progress notes", "draft
      a modification

      plan", "accommodation vs modification", "IDEA-compliant goal".


      Integrates with atom-iep-goal (SMART goal drafting), atom-differentiate (modification

      layer), and quality-review (governance gate). Routes complex eligibility questions
      to a

      human — this skill never determines eligibility.


      LEGAL BOUNDARIES (non-negotiable, always stated in output):

      - Never determines eligibility for special education services

      - Never overrides or supplements an existing IEP without the IEP team''s approval

      - All output is a DRAFT for the IEP team to review, modify, and approve per
      IDEA procedures

      - Never includes real student names, SSN, or identifying PII — placeholders
      only

      - Progress data fields require teacher-supplied actual data — never fabricated

      - Output always includes: "DRAFT — requires IEP team review and approval before
      use"

      - human_review_required: true on every output


      Do NOT use this skill to determine eligibility, make placement decisions, or
      produce legally

      binding documents. Do NOT use it to write general lesson accommodations (use
      lesson-planner

      with differentiation_profiles instead for whole-class differentiation).

      '
    parameters:
      type: object
      required:
      - request_type
      - grade
      properties:
        request_type:
          type: string
          enum:
          - iep_goal
          - accommodation_plan
          - modification_plan
          - behavior_support_plan
          - transition_plan
          - progress_note
          - present_level_of_performance
          - service_summary
          description: 'Type of special education document to draft. iep_goal generates
            one SMART annual goal (use multiple calls for multiple goals); accommodation_plan
            generates the full accommodations section; modification_plan generates
            curriculum modification recommendations.

            '
        grade:
          type: string
          description: 'Student''s current grade level. Examples: "3rd grade", "9th
            grade", "K".

            '
        disability_category:
          type: string
          description: 'IDEA disability category (optional — do not guess if unknown).
            Examples: "Specific Learning Disability", "Autism Spectrum Disorder",
            "Other Health Impairment", "Emotional Behavioral Disorder", "Intellectual
            Disability", "Speech/Language Impairment". This informs goal writing;
            does not determine eligibility.

            '
        domain:
          type: string
          enum:
          - academic
          - behavioral
          - communication
          - adaptive
          - social_emotional
          - motor
          - transition
          - reading
          - math
          - writing
          description: 'Domain for the goal or plan. Required for iep_goal. For progress_note
            or present_level, describe the domain in present_level_of_performance.

            '
        subject:
          type: string
          description: 'Academic subject if domain is academic/reading/math/writing.
            Examples: "ELA", "Math".

            '
        standards:
          type: array
          items:
            type: string
          description: 'Standards the goal should connect to. Goals should tie to
            grade-level or near-grade-level standards even when modified. Provide
            FL B.E.S.T. codes when known.

            '
        present_level_of_performance:
          type: string
          description: 'Current performance data: what the student can do, at what
            level, with what accuracy. Use placeholders for names (e.g. "the student",
            "Student A"). Required for iep_goal and behavior_support_plan. Never fabricate
            — provide real teacher-observed data or placeholder markers like "[INSERT
            ASSESSMENT DATA]".

            '
        annual_goal_focus:
          type: string
          description: 'For iep_goal: the specific skill or behavior the goal targets
            over the coming year. Examples: "decode multisyllabic words", "initiate
            peer interactions", "manage frustration using a coping strategy".

            '
        measurement_criteria:
          type: string
          description: 'For iep_goal: desired accuracy/frequency criterion (e.g. "80%
            accuracy across 3 of 4 trials", "4 out of 5 consecutive opportunities").
            If omitted, a standard criterion is drafted with a placeholder.

            '
        behavior_of_concern:
          type: string
          description: 'For behavior_support_plan: observable description of the behavior
            (topography, frequency, intensity, duration). Use objective language;
            no labels or diagnoses.

            '
        function_of_behavior:
          type: string
          enum:
          - attention
          - escape_avoidance
          - tangible
          - sensory
          - unknown_requires_fba
          description: 'For behavior_support_plan: hypothesized function from FBA.
            Use unknown_requires_fba if an FBA has not been completed.

            '
        age_at_transition:
          type: integer
          description: 'For transition_plan: student''s current age. Florida requires
            transition planning to begin by age 14 (or earlier if the IEP team determines
            appropriate).

            '
        post_secondary_goals:
          type: object
          description: 'For transition_plan: post-secondary vision across domains.
            Keys: education, employment, independent_living. Values: plain-language
            goal statements from the student/family.

            '
        legal_notice_acknowledged:
          type: boolean
          description: 'Must be true to proceed. Confirms the requestor understands
            all output is a DRAFT requiring IEP team review and approval, and that
            this skill never determines eligibility.

            '
      additionalProperties: false
- type: function
  function:
    name: standards_updater
    description: "Crawl, detect, verify, and report on changes to Florida K-12 standards\
      \ corpora: B.E.S.T.,\nNGSSS, CTE frameworks, Florida Statutes Title XLVIII (ch.1000-1013),\
      \ State Board rules\n(FAC 6A), FAST/B.E.S.T./EOC assessment fact sheets, graduation\
      \ requirements (s.1003.4282 F.S.),\nand WIDA/ELD standards. Produces a currency\
      \ brief: what changed, why it matters, and what\ndownstream TOS artifacts need\
      \ updating.\n\nTrigger phrases: \"check if standards have changed\", \"crawl\
      \ FLDOE for updates\", \"are the\nstandards current\", \"what changed in Florida\
      \ standards\", \"update the standards corpus\",\n\"currency brief\", \"crawl\
      \ CPALMS\", \"check the source URLs\", \"standards refresh\", \"is my\npacing\
      \ guide still current\".\n\nTwo detection modes:\n- document discovery: new/changed\
      \ files found via crawl_seeds in sources.json\n- content-change monitoring:\
      \ sha256 of watch_pages (statute/rule/guidance pages)\n\nChange intelligence\
      \ (triage → verify → brief):\n1. Discover broadly — secondary sources are discovery\
      \ only, never confirmation\n2. Verify on PRIMARY source (CPALMS, FLDOE, FL Legislature,\
      \ FAC/flrules.org, WIDA)\n3. Score confidence: high (primary states it directly)\
      \ / medium (scope needs interpretation)\n   / low (partial access / ambiguity)\n\
      4. Brief the impact across 8 dimensions: standards, courses/curriculum, pacing/guidance,\n\
      \   instructional materials, assessment, graduation, EL, policy/compliance\n\
      \nRender prong chain fires on ANY obstacle or confidence < 0.95 (not only js_required):\n\
      http_static → local_render → offline_docintel → screenshot_ocr → cloud_render\
      \ (opt-in).\nMultiple prongs aggregate; discrepancies → minority report. Wayback\
      \ Machine CDX API\nconfirms genuine change vs. transient fetch failure.\n\n\
      Ethics: one honest User-Agent; robots.txt respected; no CAPTCHA bypass; no UA\
      \ rotation.\nIf a source is unreachable or robots-disallowed: report and stop\
      \ for that source.\n\nDo NOT use standards-updater to write lesson plans or\
      \ assessments. Do NOT use it to\nauto-apply standards changes — every confirmed\
      \ change is advisory and human-reviewed.\nhuman_review_required: true on all\
      \ outputs.\n"
    parameters:
      type: object
      required:
      - action
      properties:
        action:
          type: string
          enum:
          - check
          - crawl
          - download
          - report
          - update_hashes
          - source_currency
          - render_check
          description: 'Action to perform. check: offline check against existing snapshot
            (no network fetch). crawl: live crawl of all seeds in sources.json; detect
            new/changed files. download: download accepted updates to out/ directory.
            report: generate currency brief from last crawl results. update_hashes:
            save new content sha256 baselines for watch_pages. source_currency: run
            source_currency.py to check if watched source URLs have gone stale, moved,
            been superseded, or disappeared (separate from file discovery). render_check:
            check render prong availability (offline capability check).

            '
        state:
          type: string
          enum:
          - florida
          description: 'State standards corpus to target. Currently only Florida is
            implemented. Defaults to florida.

            '
        report_path:
          type: string
          description: 'For report or crawl: path to write the JSON currency brief.
            Defaults to report.json.

            '
        out_dir:
          type: string
          description: 'For download: directory to save downloaded files before they
            are moved into resources/<state>/<category>/. Defaults to out/.

            '
        max_retries:
          type: integer
          description: 'Maximum retries per URL, honoring Retry-After / RateLimit-Reset
            headers. Defaults to 3.

            '
        saturation_n:
          type: integer
          description: 'Stop crawling when no new documents appear in N consecutive
            seed fetches. Defaults to 5.

            '
        checkpoint_path:
          type: string
          description: 'Path to save/load checkpoint file for resumable crawls. Required
            for --resume.

            '
        resume:
          type: boolean
          description: 'Resume from the checkpoint at checkpoint_path. Defaults to
            false.

            '
        max_wait:
          type: integer
          description: 'Maximum seconds to wait on a single rate-limit backoff. Defaults
            to 300 (5 min).

            '
        no_render_fallback:
          type: boolean
          description: 'Disable the render prong chain. By default, any obstacle or
            confidence < 0.95 triggers the chain automatically. Use this only for
            quick offline checks.

            '
          default: false
        render_enable_cloud:
          type: boolean
          description: 'Enable the cloud render prong (firecrawl). Off by default
            — the offline prongs (local_render, offline_docintel, screenshot_ocr)
            are always preferred.

            '
          default: false
        confidence_threshold:
          type: number
          description: 'Minimum confidence score (0.0-1.0) before the render prong
            chain fires. Defaults to 0.95 per the TOS render policy.

            '
          default: 0.95
      additionalProperties: false
- type: function
  function:
    name: teacher_core
    description: 'TOS routing hub. Receives any K-12 educator request and returns
      a structured routing decision:

      which TOS skill to invoke next, what parameters to pass it, and the confidence
      in that routing

      choice. Use teacher_core when routing is ambiguous (overlapping skills) or when
      you want the

      routing rationale recorded. Returns a minority report when two or more skills
      are plausible

      within 10 points of confidence.


      Trigger phrases: any educator request that does not obviously map to one skill
      — "help me with

      a lesson", "I need something for my IEP meeting", "make me a quiz", "can you
      draft a parent

      note", "audit my skills", "what skill should I use for this?"


      Do NOT use teacher_core to produce the actual artifact — it routes only. After
      receiving the

      routing decision, call the target skill with the parameters teacher_core recommends.


      Routes to: lesson-planner, assessment-designer, special-education-support, family-communication,

      meeting-classifier, quality-review, curriculum-mapping, intervention-mtss, presentation-builder,

      professional-learning, school-administration, document-intelligence, output-validator,

      feed-curator, standards-updater, teacher-profile, skill-health, skill-repair,
      and all

      atom-* sub-skills.


      Output always includes human_review_required: true and a metadata block.

      '
    parameters:
      type: object
      required:
      - request
      properties:
        request:
          type: string
          description: 'The teacher''s raw request, question, or description of what
            they need. Provide as much context as possible — grade, subject, student
            context, urgency, artifact type desired.

            '
        grade:
          type: string
          description: 'Grade level hint (e.g. "3rd grade", "9-12", "K-2"). Helps
            narrow routing when multiple skills are plausible.

            '
        subject:
          type: string
          description: 'Subject area hint (e.g. "ELA", "Algebra 1", "Biology"). Optional
            — extracted from request if not provided.

            '
        artifact_type_hint:
          type: string
          description: 'Optional hint about the desired output type (e.g. "lesson
            plan", "quiz", "IEP goal", "parent email"). teacher_core will confirm
            or correct this from request context.

            '
        teacher_context:
          type: string
          description: 'Optional background: teacher role, school, district, current
            unit, known student needs. Improves routing precision. Never include real
            student names or PII — placeholders only.

            '
        force_minority_report:
          type: boolean
          description: 'If true, always emit a minority report showing all plausible
            routes with confidence scores, even when one route is clearly dominant.

            '
      additionalProperties: false
- type: function
  function:
    name: teacher_profile
    description: 'Initialize, manage, and query the TOS teacher operating context:
      role, grade band, subject,

      school, district, student demographics, local constraints, collaboration network,
      and system

      preferences (offline tier, retrieval mode, feed update mode). Teacher-stated
      facts outrank

      crawled inference in all downstream routing and artifact generation.


      Trigger phrases: "set up my TOS profile", "update my profile", "what''s in my
      profile",

      "change my school", "reset my preferences", "I moved to a new school", "set
      my grade level",

      "update my subject", "configure TOS for my class", "show my profile", "what
      does TOS know

      about me", "teacher profile setup", "preferences wizard".


      The local profile is stored in shared/context/profiles/ (gitignored — never
      committed).

      Teacher-stated facts carry provenance: teacher_stated / confidence: high and
      outrank

      any crawled or inferred context via shared/context/sot_resolver.py.


      All preferences are REVERSIBLE:

      - --preferences --reset clears preferences without deleting identity/role

      - school_change re-runs school/standards scope questions

      - Individual fields updatable without re-running the full wizard


      System preferences (L0 roadmap):

      - offline_tier: cached_python (default) | local_semantic | local_llm

      - retrieval_mode: stdlib_keyword (always available) | vector (opt-in, gated
      on consent)

      - feed_update_mode: manual (default) | on_session_start | scheduled


      PRIVACY:

      - All profile data is stored LOCALLY and gitignored — never committed to the
      repo

      - Never includes real student names, SSNs, or PII — placeholders only

      - Staff directory integration requires STAFF_INGEST_AUTHORIZED=true environment
      variable


      Do NOT use teacher-profile to generate lesson plans, assessments, or IEP documents
      (route

      those to the appropriate skill). Do NOT use it to read or modify the standards
      corpus

      (use standards-updater).

      '
    parameters:
      type: object
      required:
      - action
      properties:
        action:
          type: string
          enum:
          - init
          - show
          - validate
          - register
          - preferences
          - reset
          - school_change
          - update_field
          - export_context_fragment
          description: 'Action to perform. init: run the full setup wizard (guided
            questions for role, grade, subject, school, student context, collaboration
            network, preferences). show: display current profile in readable format.
            validate: check profile completeness and flag missing fields that affect
            routing. register: write the current profile to the context overlay so
            downstream skills inherit it automatically. preferences: view or modify
            L0 system preferences (offline_tier, retrieval_mode, feed_update_mode)
            without re-running the full wizard. reset: clear preferences (with reset_scope);
            identity/role preserved unless scope=full. school_change: re-run school,
            district, and standards-scope questions when the teacher moves to a new
            school. Other preferences preserved. update_field: update a single profile
            field without running the full wizard. export_context_fragment: return
            the profile as a context fragment string suitable for prepending to any
            skill''s system prompt.

            '
        field_name:
          type: string
          description: 'For update_field: the profile field to update. Examples: "grade_band",
            "subject", "school_name", "district", "student_demographics", "co_teacher_present",
            "offline_tier", "feed_update_mode".

            '
        field_value:
          type: string
          description: 'For update_field: the new value for the field. For boolean
            fields use "true"/"false". For array fields use comma-separated values
            (e.g. "ELL,IEP,gifted").

            '
        reset_scope:
          type: string
          enum:
          - preferences_only
          - school_and_standards_only
          - full_profile
          description: 'For reset: what to clear. preferences_only resets offline_tier/retrieval_mode/
            feed_update_mode. school_and_standards_only resets school/district/standards
            scope. full_profile clears everything and prompts re-init.

            '
        preference_updates:
          type: object
          description: 'For preferences action: key-value pairs to set. Keys: offline_tier,
            retrieval_mode, feed_update_mode, local_model. Example: {"offline_tier":"local_semantic",
            "feed_update_mode":"on_session_start"}.

            '
          properties:
            offline_tier:
              type: string
              enum:
              - cached_python
              - local_semantic
              - local_llm
            retrieval_mode:
              type: string
              enum:
              - stdlib_keyword
              - vector
            feed_update_mode:
              type: string
              enum:
              - manual
              - on_session_start
              - scheduled
            local_model:
              type: string
              enum:
              - 'off'
              - ollama
              - llamafile
        teacher_context:
          type: object
          description: 'For init or update: teacher context object. All fields optional
            — wizard prompts for missing required fields. Never include real student
            names or PII.

            '
          properties:
            role:
              type: string
              description: Teaching role (e.g. 'general education teacher', 'special
                education teacher', 'instructional coach', 'department head', 'principal')
            grade_band:
              type: string
              description: Grade band (e.g. 'K-2', '3-5', '6-8', '9-12', 'K-12')
            grade_specific:
              type: string
              description: Specific grade(s) taught (e.g. '3rd grade', 'grades 9 and
                10')
            subject:
              type: string
              description: Subject area(s) taught
            school_name:
              type: string
              description: School name (placeholder acceptable)
            district:
              type: string
              description: District name (e.g. 'Orange County Public Schools', 'Miami-Dade
                County')
            state:
              type: string
              description: 'State (default: Florida)'
            student_demographics:
              type: string
              description: Anonymized class profile (e.g. '25 students, 30% ELL, 20%
                with IEPs, 1 gifted pull-out')
            co_teacher_present:
              type: boolean
              description: Whether a co-teacher is in the classroom
            current_unit:
              type: string
              description: Current instructional unit or topic
      additionalProperties: false
