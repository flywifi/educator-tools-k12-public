# TOS — OpenAI tools array
# Generated by tools/export_openai.py
tools:
- type: function
  function:
    name: assessment_designer
    description: 'Design standards-aligned formative and summative assessments, rubrics,
      and performance tasks

      for K-12. Every item maps to a verified standard code. Outputs include answer
      keys, distractor

      analysis (for MC), scoring guides, and Bloom''s level tags for every item. Produces
      DOK-labeled

      items and complete rubrics with descriptors at each score level.


      Trigger phrases: "write me a quiz", "create a test on", "make a rubric for",
      "design a

      performance task", "build a formative assessment", "I need an exit ticket assessment",

      "create a unit test", "write 10 multiple choice questions on".


      Integrates with atom-assessment-item (individual item generation), atom-standards-match

      (standard resolution), and atom-quality-check. Routes to quality-review before
      marking final.


      Do NOT use assessment-designer for IEP progress-monitoring measures (use

      special-education-support). Do NOT use it to design the full lesson plan around
      an assessment

      (use lesson-planner with assessment-designer called as part of the workflow).
      Do NOT fabricate

      standard codes — every item carries a verified standard citation or is flagged
      as needing one.


      Output artifacts: quiz, test, rubric, performance_task, exit_ticket_assessment,
      item_bank.

      Always outputs a metadata block with standard codes, Bloom''s distribution,
      DOK levels,

      and human_review_required: true.

      '
    parameters:
      type: object
      required:
      - grade
      - subject
      - topic
      properties:
        grade:
          type: string
          description: 'Grade level or band. Examples: "3rd grade", "9-12", "6-8",
            "Kindergarten".

            '
        subject:
          type: string
          description: 'Subject area. Examples: "ELA", "Mathematics", "Science", "Algebra
            1", "US History".

            '
        topic:
          type: string
          description: 'Specific concept or unit being assessed. Examples: "polynomial
            operations", "figurative language in poetry", "cell division".

            '
        assessment_type:
          type: string
          enum:
          - formative_quiz
          - summative_test
          - exit_ticket
          - performance_task
          - rubric
          - self_assessment
          - peer_assessment
          - item_bank
          description: 'The type of assessment artifact. Defaults to formative_quiz
            if not specified.

            '
        item_count:
          type: integer
          description: 'Number of items/questions to generate. For rubrics, this is
            the number of criteria rows. Typical range: 5–30 for quizzes/tests, 3–8
            for rubrics.

            '
        item_types:
          type: array
          items:
            type: string
            enum:
            - multiple_choice
            - short_answer
            - constructed_response
            - true_false
            - matching
            - fill_in_the_blank
            - essay
          description: 'Desired item format(s). Mix supported. If omitted, a balanced
            mix is selected based on assessment_type.

            '
        standards:
          type: array
          items:
            type: string
          description: 'Florida B.E.S.T. or NGSSS standard codes to align to. If omitted,
            atom-standards-match resolves them from grade/subject/topic.

            '
        bloom_levels:
          type: array
          items:
            type: string
            enum:
            - remember
            - understand
            - apply
            - analyze
            - evaluate
            - create
          description: 'Bloom''s taxonomy levels to target. Defaults to a balanced
            lower/higher distribution if not specified.

            '
        dok_levels:
          type: array
          items:
            type: integer
            enum:
            - 1
            - 2
            - 3
            - 4
          description: 'Depth of Knowledge levels to include. Defaults to DOK 1-2
            for formative, 1-3 for summative if not specified.

            '
        include_answer_key:
          type: boolean
          description: 'Include a full answer key with rationale for each item. Always
            true for MC and T/F. Defaults to true.

            '
        include_distractor_analysis:
          type: boolean
          description: 'For multiple_choice items: include distractor analysis explaining
            why each wrong answer is plausible and what misconception it targets.
            Defaults to true.

            '
        differentiation_profiles:
          type: array
          items:
            type: string
            enum:
            - ell
            - iep
            - gifted
            - '504'
            - below_grade
            - above_grade
          description: 'Generate differentiated versions of the assessment for these
            profiles. Each profile gets its own modified form; the learning target
            stays constant.

            '
        rubric_scale:
          type: integer
          enum:
          - 3
          - 4
          - 5
          - 6
          description: 'For rubrics: number of score levels (e.g. 4 = 1-4 scale).
            Defaults to 4.

            '
        time_limit_minutes:
          type: integer
          description: 'Intended time limit. Informs item difficulty distribution
            and instructions.

            '
        additional_context:
          type: string
          description: 'Any additional context: prior assessment results, prerequisite
            knowledge, co-teaching format. Never include real student names or PII.

            '
      additionalProperties: false
- type: function
  function:
    name: atom_activity_generate
    description: 'Generate ONE complete learning activity for a given objective, grade,
      and subject. Output

      includes: activity title, procedure (step-by-step teacher and student actions),
      materials,

      estimated timing, DOK level, grouping structure, and a formative check at the
      end.


      Each activity maps to exactly ONE learning objective (call this skill once per
      activity you

      need; use lesson-planner to sequence multiple activities into a full lesson).


      Activity types supported: direct instruction sequence, think-pair-share, stations/centers,

      gallery walk, Socratic seminar, jigsaw, problem-based learning task, project
      component,

      reader''s theater, math workshop model, and teacher-directed guided practice.


      Called by: lesson-planner (populates the lesson body), curriculum-mapping (generates
      sample

      activities per unit), and any workflow building modular instructional sequences.


      Trigger phrases: "generate an activity for", "what''s a good activity for this
      objective",

      "create a classroom activity about", "design one activity for", "build an activity
      for",

      "I need an activity that teaches".


      Do NOT use atom-activity-generate to write a complete multi-activity lesson
      (use

      lesson-planner). Do NOT use it to write assessments (use atom-assessment-item
      or

      assessment-designer). human_review_required: true.

      '
    parameters:
      type: object
      required:
      - objective
      - grade
      - subject
      properties:
        objective:
          type: string
          description: 'The learning objective this activity should achieve. Should
            be a SWBAT statement or measurable goal. Examples: "SWBAT explain photosynthesis
            stages by completing a labeled diagram", "SWBAT solve two-step word problems
            involving multiplication".

            '
        grade:
          type: string
          description: 'Grade level. Examples: "3rd grade", "7th grade", "High School
            Biology".

            '
        subject:
          type: string
          description: 'Subject area. Examples: "Science", "Mathematics", "ELA", "Social
            Studies".

            '
        activity_type:
          type: string
          enum:
          - direct_instruction
          - think_pair_share
          - stations_centers
          - gallery_walk
          - socratic_seminar
          - jigsaw
          - problem_based_learning
          - project_component
          - readers_theater
          - math_workshop
          - guided_practice
          - independent_practice
          - cooperative_learning
          - auto_select
          description: 'Instructional format. Defaults to auto_select (skill picks
            the format that best fits the objective and DOK level).

            '
        dok_level:
          type: integer
          enum:
          - 1
          - 2
          - 3
          - 4
          description: 'Target Depth of Knowledge level. Defaults to 2 (skill and
            concept). Use 3-4 for higher-order reasoning and extended thinking tasks.

            '
        duration_minutes:
          type: integer
          description: 'Time budget for this activity in minutes. Examples: 10-15
            for a quick warm-up activity, 20-30 for a main lesson activity, 45-60
            for a full project work period.

            '
        grouping:
          type: string
          enum:
          - individual
          - partner
          - small_group_3_4
          - whole_class
          - flexible
          description: 'Student grouping structure. Defaults to flexible (skill chooses
            based on activity type).

            '
        materials_available:
          type: array
          items:
            type: string
          description: 'Materials already available in the classroom (e.g. ["Chromebooks",
            "base-ten blocks", "chart paper", "whiteboard markers"]). Activity will
            use only these materials, or note when a better material is worth acquiring.

            '
        standard:
          type: string
          description: 'Standard code the activity addresses (e.g. "MAFS.4.NBT.2.5").
            Optional — extracted from objective if not provided.

            '
        differentiation_embedded:
          type: boolean
          description: 'If true, embed one differentiation move within the activity
            procedure (e.g. a sentence frame for ELL students, a tiered problem set,
            a challenge extension). Defaults to true.

            '
        include_formative_check:
          type: boolean
          description: 'If true, include a quick formative check at the end of the
            activity (exit ticket, show me, whiteboard). Defaults to true.

            '
      additionalProperties: false
- type: function
  function:
    name: atom_assessment_item
    description: 'Generate ONE assessment item with its answer key. Supports multiple
      choice (with distractor

      analysis), short answer, constructed response, true/false, and matching. Every
      item maps to

      a verified standard code, carries a Bloom''s level and DOK level tag, and includes
      a scoring

      guide or answer key.


      Each call generates exactly ONE item. Use assessment-designer to generate a
      full assessment

      with multiple items, item-type distribution, and rubric.


      For multiple choice: generates 4 answer options (one correct, three plausible
      distractors)

      plus distractor analysis explaining the misconception each wrong answer targets.


      For constructed response: generates a multi-point scoring guide with score-point
      descriptors

      (what earns full credit, partial credit, and no credit).


      Called by: assessment-designer (populates an item bank item-by-item), lesson-planner

      (generates exit-ticket items), and any workflow needing a single verified assessment
      item.


      Trigger phrases: "write a multiple choice question about", "create a short answer
      question for",

      "make a constructed response item on", "write one test question about", "assessment
      item for

      this standard", "write a true/false question on".


      Do NOT use atom-assessment-item to write a full assessment (use assessment-designer).
      Do NOT

      use it to write IEP progress-monitoring probes (use special-education-support).
      Every item

      carries human_review_required: true — teacher reviews before use with students.

      '
    parameters:
      type: object
      required:
      - topic
      - grade
      - subject
      - item_type
      properties:
        topic:
          type: string
          description: 'Concept or skill the item assesses. Examples: "the water cycle",
            "long division", "main idea vs. supporting detail", "causes of World War
            I".

            '
        grade:
          type: string
          description: 'Grade level. Examples: "4th grade", "8th grade", "11th grade".

            '
        subject:
          type: string
          description: 'Subject area. Examples: "Science", "Mathematics", "ELA", "US
            History".

            '
        item_type:
          type: string
          enum:
          - multiple_choice
          - short_answer
          - constructed_response
          - true_false
          - matching
          - fill_in_the_blank
          - essay
          - performance_task_component
          description: 'The format of the assessment item to generate.

            '
        standard:
          type: string
          description: 'Florida B.E.S.T. or NGSSS standard code the item maps to.
            If omitted, atom-standards-match is called internally to find the most
            relevant standard.

            '
        bloom_level:
          type: string
          enum:
          - remember
          - understand
          - apply
          - analyze
          - evaluate
          - create
          description: 'Target Bloom''s taxonomy level. Defaults to understand for
            most formative items; apply or analyze for summative items.

            '
        dok_level:
          type: integer
          enum:
          - 1
          - 2
          - 3
          - 4
          description: 'Target Depth of Knowledge level. DOK 1 = recall; DOK 2 = skill/concept;
            DOK 3 = strategic thinking; DOK 4 = extended thinking. Defaults to 2.

            '
        include_answer_key:
          type: boolean
          description: 'Include the correct answer with rationale. Always true for
            MC and T/F. For constructed_response, includes the full scoring guide.
            Defaults to true.

            '
        include_distractor_analysis:
          type: boolean
          description: 'For multiple_choice only: include an explanation of why each
            wrong answer is plausible and what misconception it targets. Defaults
            to true.

            '
        point_value:
          type: integer
          description: 'Point value for the item. For constructed_response, this is
            the total possible points (determines how many score-point levels are
            described). Defaults to 1 for MC/T/F, 4 for short_answer, 6 for constructed_response.

            '
        stimulus:
          type: string
          description: 'Optional passage, graph, data table, diagram description,
            or scenario to base the item on. If provided, the item stems from this
            stimulus rather than asking about the topic abstractly. For ELA reading
            comprehension items, provide the text excerpt here.

            '
        difficulty_level:
          type: string
          enum:
          - introductory
          - grade_level
          - advanced
          - honors
          description: 'Item difficulty. Defaults to grade_level.

            '
        accessibility_features:
          type: array
          items:
            type: string
            enum:
            - simplified_language
            - visual_support_note
            - ell_scaffolded
            - extended_time_version
          description: 'Accessibility modifications to embed. The base item is unchanged;
            modifications are listed as "Accessibility version" notes at the end.

            '
      additionalProperties: false
- type: function
  function:
    name: atom_differentiate
    description: "Apply ONE differentiation profile to a piece of educational content.\
      \ Returns a modified\nversion of the content alongside explicit notes on what\
      \ was changed and why. The learning\ntarget is ALWAYS preserved — differentiation\
      \ adjusts ACCESS to the content, never the\nstandard itself.\n\nSupported profiles:\n\
      - ell: English Language Learners — vocabulary scaffolds, sentence frames, visual\
      \ support cues,\n  cognate highlighting, simplified syntax without dumbing down\
      \ content\n- iep: Students with IEPs — modifications based on common IEP accommodation\
      \ categories\n  (extended time notation, reduced item count, chunked directions,\
      \ visual schedules, graphic\n  organizers). NOTE: this generates generic IEP-tier\
      \ differentiation, not student-specific\n  accommodations (use special-education-support\
      \ for student-specific IEP work)\n- gifted: Gifted/advanced learners — enrichment\
      \ extensions, higher-order questioning,\n  independent research options, cross-curricular\
      \ connections, complexity increases\n- 504: Section 504 accommodations — presentation/response/setting\
      \ modifications\n- below_grade: Below grade-level students — scaffolded version\
      \ with prerequisite skill\n  supports, visual aids, partner work modifications\n\
      - above_grade: Above grade-level students — accelerated version with extension\
      \ tasks and\n  connections to advanced content\n\nCalled by: lesson-planner,\
      \ assessment-designer, curriculum-mapping, atom-activity-generate.\nCan be called\
      \ directly when a teacher has a piece of content and wants one differentiated\
      \ version.\n\nTrigger phrases: \"differentiate this for ELL students\", \"modify\
      \ this for my IEP students\",\n\"make a gifted version of\", \"adapt this for\
      \ below-grade readers\", \"ELL scaffold for\",\n\"504 accommodations for this\
      \ activity\", \"differentiated version for\".\n\nDo NOT use atom-differentiate\
      \ to write student-specific IEP goals (use atom-iep-goal or\nspecial-education-support).\
      \ Do NOT use it to produce legally binding accommodation plans.\nhuman_review_required:\
      \ true — teacher confirms modifications fit each student's actual needs.\n"
    parameters:
      type: object
      required:
      - content
      - differentiation_profile
      - grade
      - subject
      properties:
        content:
          type: string
          description: 'The educational content to differentiate. Accepts: lesson
            segment text, activity instructions, assessment item text, reading passage
            excerpt, discussion prompt, homework assignment, or any instructional
            text. For best results: provide the full piece of content, not a summary.

            '
        differentiation_profile:
          type: string
          enum:
          - ell
          - iep
          - gifted
          - '504'
          - below_grade
          - above_grade
          description: 'The differentiation profile to apply. Each call applies exactly
            one profile. To generate multiple versions, call atom-differentiate once
            per profile.

            '
        grade:
          type: string
          description: 'Grade level of the original content. Examples: "3rd grade",
            "8th grade".

            '
        subject:
          type: string
          description: 'Subject area. Examples: "ELA", "Mathematics", "Science".

            '
        learning_target:
          type: string
          description: 'The core learning target / standard the content addresses.
            atom-differentiate uses this to verify the modified version still achieves
            the target. If omitted, the target is inferred from the content (less
            reliable — provide it when you have it).

            '
        ell_proficiency_level:
          type: string
          enum:
          - entering
          - emerging
          - developing
          - expanding
          - bridging
          description: 'For ell profile: WIDA English proficiency level. Scaffolds
            are calibrated to this level. Defaults to developing (most common middle
            level).

            '
        output_format:
          type: string
          enum:
          - modified_content_only
          - side_by_side_comparison
          - annotated_with_change_notes
          description: 'How to present the output. modified_content_only (default):
            just the differentiated version. side_by_side_comparison: original + modified
            in parallel columns. annotated_with_change_notes: modified version with
            inline notes on each change made and why — useful for teacher professional
            learning.

            '
        preserve_item_count:
          type: boolean
          description: 'For assessment item differentiation: if true, maintain the
            same number of items/questions in the modified version (adjusting scaffolding
            but not reducing quantity). Defaults to false (IEP/504 versions may appropriately
            reduce item count).

            '
      additionalProperties: false
- type: function
  function:
    name: atom_iep_goal
    description: 'Write ONE SMART IEP annual goal following the IDEA-compliant three-part
      formula:

      Condition + Behavior + Criterion. Each goal ties to a domain (academic, behavioral,

      communication, adaptive, social-emotional, motor, or transition), maps to a
      grade-level

      or near-grade-level standard when applicable, and includes suggested progress-monitoring

      frequency and measurement method.


      SMART goal formula:

      - S: Specific (observable behavior named)

      - M: Measurable (criterion stated with accuracy/frequency/rate)

      - A: Achievable (realistic for the annual period given PLOP)

      - R: Relevant (connected to standard or functional need)

      - T: Time-bound (by the annual IEP date)


      Three-part structure:

      [Condition]: Given [materials/support/setting/cue]...

      [Behavior]: ...[student] will [observable verb + skill]...

      [Criterion]: ...with [accuracy/frequency/rate] as measured by [tool] across
      [trials/sessions].


      Example output:

      "Given a grade-level informational text and a graphic organizer, [STUDENT] will
      identify the

      main idea and two supporting details with 80% accuracy across 4 of 5 consecutive
      trials as

      measured by teacher-administered running records, by the annual IEP date."


      Called by: special-education-support (builds full IEP goal sections), and can
      be called

      directly for a fast single-goal draft.


      LEGAL NOTICE (included in every output):

      - This is a DRAFT for review and approval by the IEP team, not a final IEP document

      - This skill does not determine eligibility, placement, or services

      - The IEP team must review, modify, and approve all goals per IDEA procedures

      - Present Level of Performance (PLOP) data must come from the teacher/team,
      not generated here


      Trigger phrases: "write an IEP goal for", "draft an annual goal", "IEP reading
      goal",

      "behavior goal for IEP", "communication goal draft", "transition goal for",
      "SMART IEP goal".


      Do NOT use atom-iep-goal to write lesson plan objectives (use atom-objective-write).

      Do NOT use it to determine eligibility or make placement decisions.

      human_review_required: true on every output.

      '
    parameters:
      type: object
      required:
      - domain
      - grade
      - present_level_of_performance
      - legal_notice_acknowledged
      properties:
        domain:
          type: string
          enum:
          - academic_reading
          - academic_math
          - academic_writing
          - behavioral
          - communication_expressive
          - communication_receptive
          - adaptive_daily_living
          - social_emotional
          - fine_motor
          - gross_motor
          - transition_employment
          - transition_postsecondary_education
          - transition_independent_living
          - assistive_technology
          description: 'IEP goal domain. Determines the observable behavior vocabulary
            and criterion norms used in the draft.

            '
        grade:
          type: string
          description: 'Student''s current grade level. Examples: "3rd grade", "9th
            grade", "K".

            '
        present_level_of_performance:
          type: string
          description: 'Teacher-supplied baseline data describing what the student
            can currently do, at what level, and with what accuracy. THIS MUST COME
            FROM REAL ASSESSMENT DATA — never fabricate. Use "[INSERT BASELINE DATA]"
            as a placeholder if data is not yet available. Example: "Student currently
            reads at a 1st grade level (38 wcpm on a Grade 1 oral reading fluency
            probe); decodes CVC and CVCe words with 70% accuracy."

            '
        annual_goal_focus:
          type: string
          description: 'The specific skill or behavior the goal should target over
            the coming year. Be precise. Examples: "decode multisyllabic words with
            prefixes and suffixes", "initiate peer interactions during unstructured
            time", "complete multi-step math problems using a graphic organizer",
            "use ''I need a break'' card to request sensory regulation break".

            '
        measurement_criterion:
          type: string
          description: 'The performance criterion (accuracy, frequency, rate, duration).
            Examples: "80% accuracy across 4 of 5 trials", "3 times per week", "within
            3 minutes", "9 of 10 consecutive opportunities". If omitted, a research-normed
            criterion is drafted with a placeholder for team review.

            '
        measurement_tool:
          type: string
          description: 'Progress-monitoring tool. Examples: "teacher-administered
            CBM", "DIBELS 8th Ed ORF probes", "behavior frequency count", "work sample
            analysis", "observation checklist". If omitted, an appropriate tool is
            recommended.

            '
        condition:
          type: string
          description: 'The condition/context for the goal: given what materials,
            supports, or cues will the student demonstrate the skill? Examples: "given
            a grade-level informational text and a graphic organizer", "given a visual
            behavior support chart", "given a calculator and a step-by-step problem-solving
            guide". If omitted, a standard condition is drafted.

            '
        standard:
          type: string
          description: 'Florida B.E.S.T. or NGSSS standard the goal connects to (for
            academic goals). Optional for behavioral/functional goals. If omitted
            and domain is academic, the skill attempts to connect to the nearest appropriate
            standard.

            '
        progress_monitoring_frequency:
          type: string
          enum:
          - weekly
          - biweekly
          - monthly
          - quarterly
          - at_each_iep_review
          description: 'How often progress on this goal will be measured. Defaults
            to biweekly for academic goals, weekly for behavioral goals.

            '
        short_term_objectives:
          type: boolean
          description: 'If true, include 2-3 short-term objectives / benchmarks as
            interim steps toward the annual goal. Required for students with significant
            cognitive disabilities in Florida. Defaults to false.

            '
        legal_notice_acknowledged:
          type: boolean
          description: 'REQUIRED — must be true to proceed. Confirms that the requestor
            understands this is a DRAFT requiring IEP team review and approval, and
            that this skill never determines eligibility, placement, or services.

            '
      additionalProperties: false
- type: function
  function:
    name: atom_misconception
    description: 'Identify 2-5 common student misconceptions for a given topic, grade,
      and subject. For each

      misconception, explains WHY it occurs (cognitive origin or prior knowledge conflict)
      and

      provides a specific instructional remedy — an activity, question, or approach
      that directly

      addresses the misconception.


      Research-grounded: misconceptions draw from known literature in math/science
      education

      research, cognitive load theory, and documented common errors in FL assessment
      data. Not

      fabricated — when a misconception is inferred rather than documented, it is
      flagged as

      "commonly observed" rather than "research-documented."


      Called by: lesson-planner (embeds misconception awareness in the lesson), assessment-designer

      (informs distractor design for MC questions), atom-assessment-item (when generating

      distractors), and atom-activity-generate (builds activities that proactively
      address errors).


      Trigger phrases: "what misconceptions do students have about", "common mistakes
      on",

      "why do students struggle with", "what errors do students make on", "misconceptions
      for",

      "common student errors in", "what do kids get wrong about".


      Do NOT use atom-misconception to diagnose an individual student''s specific
      misconception

      (that requires looking at the student''s actual work). This skill returns COMMON
      misconceptions

      for a topic at a grade level, not individual student assessment. human_review_required:
      true.

      '
    parameters:
      type: object
      required:
      - topic
      - grade
      - subject
      properties:
        topic:
          type: string
          description: 'The concept or skill to surface misconceptions for. Be specific
            for best results. Examples: "multiplying fractions by whole numbers" (better
            than just "fractions"), "inferring author''s purpose" (better than just
            "reading"), "photosynthesis vs. respiration" (better than just "cell processes").

            '
        grade:
          type: string
          description: 'Grade level. Examples: "4th grade", "7th grade", "10th grade".
            More specific = better-calibrated misconceptions for the developmental
            level.

            '
        subject:
          type: string
          description: 'Subject area. Examples: "Mathematics", "ELA", "Science", "Social
            Studies".

            '
        count:
          type: integer
          description: 'Number of misconceptions to return. Range: 2-5. Defaults to
            3. Use 2 for a quick check; 5 when doing thorough lesson prep or assessment
            design.

            '
        standard:
          type: string
          description: 'Florida B.E.S.T. or NGSSS standard code if you want misconceptions
            scoped to a specific standard''s demands. Optional — inferred from topic/grade/subject
            if omitted.

            '
        include_instructional_remedy:
          type: boolean
          description: 'If true (default), include a specific instructional remedy
            for each misconception — an activity, question sequence, or instructional
            approach that directly addresses it.

            '
        include_assessment_probes:
          type: boolean
          description: 'If true, include a diagnostic question or prompt (an "assessment
            probe") that can elicit each misconception for formative monitoring. These
            are different from remedies — they help the teacher DETECT the misconception,
            not fix it. Defaults to false.

            '
        source_type:
          type: string
          enum:
          - research_documented
          - commonly_observed
          - both
          description: 'Filter misconceptions by evidence base. research_documented
            returns only misconceptions with documented research citations. commonly_observed
            includes teacher-reported and assessment-data-inferred patterns. Defaults
            to both.

            '
      additionalProperties: false
- type: function
  function:
    name: atom_objective_write
    description: 'Write 1-3 measurable SWBAT (Students Will Be Able To) learning objectives
      for a given

      grade, subject, and standard. Each objective includes: the SWBAT statement,
      Bloom''s taxonomy

      level tag, DOK level, a suggested assessment method, and the standard code it
      maps to.


      Objectives follow the SWBAT formula: observable verb + content + condition +
      criterion.

      Example: "SWBAT explain (Bloom''s: Understand / DOK 2) the water cycle stages
      by labeling a

      diagram with 85% accuracy."


      Called by: lesson-planner (auto-generates objectives from standards), curriculum-mapping

      (unit learning targets), and any workflow needing measurable objectives before
      building

      activities or assessments.


      Trigger phrases: "write learning objectives for", "SWBAT for", "what''s the
      learning target",

      "write objectives for this standard", "measurable objectives for", "learning
      goals for".


      Do NOT use atom-objective-write to write the full lesson plan (use lesson-planner).
      Do NOT use

      it to write IEP goals (use atom-iep-goal or special-education-support — IEP
      goals have

      different legal requirements than lesson objectives). human_review_required:
      true.

      '
    parameters:
      type: object
      required:
      - topic
      - grade
      - subject
      properties:
        topic:
          type: string
          description: 'Concept or skill the objective targets. Examples: "inferring
            author''s purpose", "multiplying fractions", "identifying cause and effect
            in science texts".

            '
        grade:
          type: string
          description: 'Grade level. Examples: "3rd grade", "7th grade", "10th grade".

            '
        subject:
          type: string
          description: 'Subject area. Examples: "ELA", "Mathematics", "Science".

            '
        standards:
          type: array
          items:
            type: string
          description: 'Standard codes the objectives should address. If omitted,
            atom-standards-match is called internally to find the most relevant standard.
            Provide codes when you already have them (faster, no secondary lookup).

            '
        bloom_level:
          type: string
          enum:
          - remember
          - understand
          - apply
          - analyze
          - evaluate
          - create
          - mixed
          description: 'Bloom''s level to target. Use mixed (default) to get a spread
            across the unit. Specify a single level for focused practice or skills
            work.

            '
        count:
          type: integer
          enum:
          - 1
          - 2
          - 3
          description: 'Number of objectives to write. Defaults to 2. For a single-lesson
            focus, 1-2 is recommended. For a unit or multi-day lesson, use 3.

            '
        lesson_context:
          type: string
          description: 'Optional context: where in the unit this lesson falls, prior
            knowledge students have, the lesson''s role in a larger sequence. Helps
            calibrate Bloom''s level and specificity.

            '
        include_assessment_suggestion:
          type: boolean
          description: 'If true, add a suggested formative assessment method for each
            objective (exit ticket, thumbs up/down, whiteboard check, quick write).
            Defaults to true.

            '
      additionalProperties: false
- type: function
  function:
    name: atom_parent_comm
    description: "Draft ONE parent/guardian communication: email, text-home note,\
      \ or brief letter. Purpose-\ndriven templates for common educator scenarios.\
      \ All output uses placeholder names (never real\nstudent/family names), targets\
      \ grade 6-8 reading level by default, and carries\nhuman_review_required: true\
      \ for teacher review before sending.\n\nThis is the FOCUSED single-message version.\
      \ Use family-communication for complex multi-section\ndocuments (newsletters,\
      \ full conference notes, multi-language packets).\n\nCommunication purposes:\n\
      - positive_update: celebrate an achievement, share growth, highlight a classroom\
      \ success\n- academic_concern: communicate academic struggle or falling grades\
      \ — strength-based framing\n- behavior_note: observable behavior description\
      \ (non-labeling, objective language only)\n- conference_request: invite family\
      \ to an in-person or virtual meeting\n- academic_progress: structured academic\
      \ progress update (mid-grading period, end of unit)\n- attendance: attendance\
      \ concern or commendation\n- general_information: supplies, schedule change,\
      \ event reminder, logistical information\n- crisis_or_urgent: urgent situation\
      \ requiring immediate parent contact (brief, factual, no\n  speculation about\
      \ cause — route serious safety situations to administration first)\n\nPrivacy\
      \ rules enforced on every output:\n- Student names → \"your child\" or [STUDENT\
      \ NAME]\n- Family names → \"Dear Family\" or [FAMILY NAME]\n- No SSN, address,\
      \ phone, student ID, or disability label to unauthorized recipients\n\nTrigger\
      \ phrases: \"write a parent note about\", \"draft an email to parents\", \"\
      text home about\",\n\"quick parent communication\", \"write a note home\", \"\
      parent email for\", \"family message about\".\n\nDo NOT use atom-parent-comm\
      \ for legally required IDEA notices (Prior Written Notice,\nProcedural Safeguards)\
      \ — use district official forms. human_review_required: true.\n"
    parameters:
      type: object
      required:
      - communication_purpose
      - grade
      properties:
        communication_purpose:
          type: string
          enum:
          - positive_update
          - academic_concern
          - behavior_note
          - conference_request
          - academic_progress
          - attendance
          - general_information
          - crisis_or_urgent
          description: 'The reason for contacting the family. Determines template
            structure and tone guidance.

            '
        grade:
          type: string
          description: 'Student''s grade level. Examples: "3rd grade", "10th grade",
            "Kindergarten".

            '
        subject:
          type: string
          description: 'Subject area if relevant (e.g., "Math", "ELA"). Omit for whole-class
            or behavior communications.

            '
        key_points:
          type: array
          items:
            type: string
          description: 'The main facts or messages to convey. The skill wraps these
            in fluent, professional prose. Examples for a behavior note: ["Student
            called out 4 times during reading block", "Verbal reminder given twice",
            "Would like family to reinforce hand-raising at home"]. Always use observable
            descriptions — never labels or diagnoses.

            '
        tone:
          type: string
          enum:
          - warm
          - professional
          - urgent
          - celebratory
          - neutral
          description: 'Communication tone. Defaults: warm for positive_update/celebration;
            professional for academic concerns; urgent for crisis_or_urgent. Override
            if needed.

            '
        medium:
          type: string
          enum:
          - email
          - printed_note
          - text_message
          - app_message
          description: 'Delivery medium. Affects length and formatting. text_message
            produces a brief 2-3 sentence version. Defaults to email.

            '
        reading_level_target:
          type: string
          enum:
          - grade_4_6
          - grade_6_8
          - grade_8_10
          description: 'Target Flesch-Kincaid reading level. Defaults to grade_6_8.

            '
        language:
          type: string
          description: 'Output language. Defaults to "en" (English). Use "es" for
            Spanish, "ht" for Haitian Creole. Dual-language (e.g. "en+es") writes
            both versions together.

            '
        next_steps_for_family:
          type: array
          items:
            type: string
          description: 'Specific, actionable next steps you want the family to take.
            Examples: ["Please sign and return the behavior chart", "Let us know a
            good time for a phone conference", "Review the study guide together before
            Friday"]. Included as a bulleted list near the close of the message.

            '
        teacher_name_placeholder:
          type: string
          description: 'Name or role to sign the message with. Defaults to "[Your
            Name]". Examples: "Ms. Rivera", "The 5th Grade Team", "[TEACHER NAME]".

            '
      additionalProperties: false
- type: function
  function:
    name: atom_quality_check
    description: 'Run ONE quality gate check on an artifact excerpt and return pass/fail/warn
      with a score,

      explanation, and corrective action. Operates on a single dimension of the 9-dimension
      TOS

      Quality Gates rubric.


      This is the FASTEST quality check in TOS — scores one dimension only, low token
      cost.

      Use quality-review for a full 9-dimension review. Use atom-quality-check for:

      - Pre-flight spot checks during generation ("is the safety dimension clean before
      I proceed?")

      - Single-dimension re-checks after a correction ("did my fix resolve the governance
      gap?")

      - Pipeline validation at each step of a multi-step workflow


      The 9 dimensions (check one per call):

      1. integrity — no fabrication, citations verifiable, standard codes real

      2. safety — no harmful content, age-appropriate, no real PII

      3. governance — metadata block present, human_review_required: true, no auto-approval

      4. accuracy — factually correct, standards-aligned, legally sound for SpEd/504

      5. alignment — objectives match assessment match activities; tied to stated
      standards

      6. educational_quality — pedagogically sound, Bloom''s/DOK appropriate, differentiation
      present

      7. accessibility — reading level appropriate, UDL considerations, language clarity

      8. professional_quality — formatting, completeness, usable as-is after teacher
      review

      9. user_intent — addresses what the teacher actually asked for


      Scoring: 0 (critical failure — blocks Approval) / 1-2 (fail) / 3 (warn) / 4
      (pass) / 5 (exemplary).


      Called by: all orchestrator skills during their generation pipeline, quality-review
      for

      parallel dimension scoring, and output-validator for governance pre-flight.


      Trigger phrases: "quick check on the safety of this", "does this pass the governance
      gate",

      "check the integrity of this", "is this educationally sound", "accessibility
      check on this".


      Do NOT use atom-quality-check as a substitute for the full quality-review (use
      quality-review

      to get the composite score and Approved/Rejected verdict). human_review_required:
      true.

      '
    parameters:
      type: object
      required:
      - artifact_excerpt
      - dimension
      properties:
        artifact_excerpt:
          type: string
          description: 'The artifact text to check. For targeted checks, provide only
            the relevant section (e.g. for governance: the metadata block; for safety:
            the full text of the artifact). For comprehensive single-dimension scoring,
            provide the full artifact.

            '
        dimension:
          type: string
          enum:
          - integrity
          - safety
          - governance
          - accuracy
          - alignment
          - educational_quality
          - accessibility
          - professional_quality
          - user_intent
          description: 'The Quality Gates dimension to evaluate. One dimension per
            call.

            '
        artifact_type:
          type: string
          enum:
          - lesson_plan
          - assessment
          - iep_goal
          - accommodation_plan
          - parent_communication
          - professional_learning
          - walkthrough_instrument
          - generic
          description: 'Type of the artifact being checked. Determines which rubric
            criteria apply for the selected dimension. Defaults to generic.

            '
        original_request:
          type: string
          description: 'Required for user_intent dimension: the teacher''s original
            request that produced this artifact, so the check can verify the output
            actually addresses what was asked.

            '
        standards_claimed:
          type: array
          items:
            type: string
          description: 'For integrity and alignment dimensions: the standard codes
            the artifact claims to address. atom-quality-check verifies these codes
            exist in the FL standards corpus. If omitted, codes are extracted from
            artifact_excerpt text.

            '
        include_corrective_action:
          type: boolean
          description: 'If true (default), include a specific corrective action when
            score < 4. The corrective action describes the minimum change needed to
            pass the dimension.

            '
      additionalProperties: false
- type: function
  function:
    name: atom_reading_level
    description: 'Estimate the reading level of a text passage (up to ~500 words).
      Returns a grade-band

      estimate, Lexile estimate, and brief readability analysis. Used to verify that

      teacher-generated or AI-generated content is accessible to the intended audience,
      or to

      check parent communications for appropriate reading level.


      When the textstat library is available (local_optional capability), computes
      exact

      Flesch-Kincaid Grade Level, Flesch Reading Ease, and Gunning Fog Index. When
      absent,

      returns a rubric-based estimate with honest capability gap noted.


      Called by: family-communication (verifies parent letter readability), atom-differentiate

      (verifies the modified version hit the target reading level), lesson-planner
      (checks

      that instructional text is at the right level for the grade), and quality-review

      (accessibility dimension scoring).


      Trigger phrases: "what reading level is this", "check the readability of", "is
      this at a

      6th grade reading level", "Lexile estimate for", "is this too hard for 4th graders",

      "reading level check", "Flesch-Kincaid for this passage", "readability of this
      text".


      Do NOT use atom-reading-level to assess student reading ability or generate
      Lexile

      scores for student placement (those require standardized assessments). This
      skill rates

      TEXT complexity, not reader ability. human_review_required: true.

      '
    parameters:
      type: object
      required:
      - passage
      properties:
        passage:
          type: string
          description: 'The text to analyze. Maximum ~500 words for best results.
            For longer documents, provide a representative excerpt (e.g., the first
            paragraph, a middle section, and a final paragraph) to get a representative
            estimate.

            '
        grade_context:
          type: string
          description: 'The intended grade level or audience. Examples: "3rd grade
            students", "4th grade ELL students", "parents of K-5 students", "middle
            school teachers". Used to contextualize the estimate — a text at 9th grade
            Lexile is appropriate for a 9th grade audience but flagged as too hard
            for 3rd grade.

            '
        purpose:
          type: string
          enum:
          - student_instructional_text
          - student_independent_reading
          - parent_communication
          - teacher_professional_document
          - assessment_item
          description: 'What the text is for. Affects what reading level is "appropriate."
            Parent communications target grade 6-8; student instructional text targets
            grade band; assessment items typically match or are 1-2 grades below instructional
            level.

            '
        output_format:
          type: string
          enum:
          - grade_band_estimate
          - lexile_estimate
          - full_analysis
          - pass_fail_for_purpose
          description: 'What to return. grade_band_estimate (default): K-2, 3-5, 6-8,
            9-10, 11-12 band + brief rationale. lexile_estimate: numeric Lexile range
            (e.g. "760L-820L") + confidence note. full_analysis: all readability metrics
            available + recommendations for adjustment. pass_fail_for_purpose: simple
            PASS/WARN/FAIL against the grade_context and purpose.

            '
        flag_accessibility_issues:
          type: boolean
          description: 'If true, flag specific phrases, sentences, or vocabulary that
            push the level up — with suggestions to simplify each flagged item. Useful
            when you want targeted edits rather than a general estimate. Defaults
            to false.

            '
      additionalProperties: false
- type: function
  function:
    name: atom_standards_match
    description: 'Look up Florida B.E.S.T. or NGSSS standards matching a topic, grade,
      and subject. Returns a

      ranked list of matching standard codes with full text, strand, and cluster.
      Uses the local

      SQLite/FTS5 standards cache (shared/cache/) when available for zero-token offline
      lookup;

      falls back to keyword search over the standards JSON.


      This is the FASTEST standards lookup in TOS — no large files are read, no fabrication
      is

      possible (codes come from the verified 6,583-FL-standard corpus). Every code
      returned is real

      and verifiable on CPALMS.


      Trigger phrases: "what standards cover", "find the standard for", "which FL
      standard applies

      to", "look up the B.E.S.T. standard", "what code is this", "standards for this
      topic".


      Used by: lesson-planner, assessment-designer, curriculum-mapping, intervention-mtss,

      atom-objective-write, atom-assessment-item, and any skill that needs a verified
      standard code

      before generating content.


      Do NOT use atom-standards-match to write lesson plans or assessments — it returns
      codes only.

      Output always includes human_review_required: true (teacher confirms the code
      fits the lesson

      before using it in a formal artifact).

      '
    parameters:
      type: object
      required:
      - topic
      - grade
      - subject
      properties:
        topic:
          type: string
          description: 'Concept or skill to match standards for. Examples: "fractions
            greater than 1", "photosynthesis", "argumentative writing", "civil rights
            movement", "linear equations".

            '
        grade:
          type: string
          description: 'Grade level. Examples: "3rd grade", "5th grade", "9th grade",
            "K", "Grade 8".

            '
        subject:
          type: string
          description: 'Subject area. Examples: "Mathematics", "ELA", "Science", "Social
            Studies", "Biology", "US History".

            '
        standards_corpus:
          type: string
          enum:
          - florida_best
          - florida_ngsss
          - florida_all
          - ccss
          description: 'Which standards corpus to search. Defaults to florida_all
            (B.E.S.T. + NGSSS combined). Use florida_best for the current adopted
            standard; florida_ngsss for legacy alignment.

            '
        max_results:
          type: integer
          description: 'Maximum number of matching standards to return. Defaults to
            5. Range: 1-20.

            '
        keyword_override:
          type: string
          description: 'Alternate search keywords if the topic phrase doesn''t surface
            good matches. The standards search will use these words instead of (not
            in addition to) the topic.

            '
        include_related_standards:
          type: boolean
          description: 'If true, also return standards in adjacent strands that relate
            to the topic (supporting standards, prerequisite standards). Defaults
            to false.

            '
        strand_filter:
          type: string
          description: 'Limit results to a specific strand code prefix. Examples:
            "LAFS.4.RI" (grade 4 informational text), "MAFS.5.NF" (grade 5 fractions),
            "SC.8.L" (grade 8 life science). Useful when you know which strand the
            standard lives in.

            '
      additionalProperties: false
- type: function
  function:
    name: curriculum_mapping
    description: 'Build standards-based curriculum maps, pacing guides, scope and
      sequence documents, and

      standards-alignment matrices for K-12. Ensures complete coverage of all required
      standards

      with zero unplanned gaps, identifies instructional time allocations, and produces
      editable

      planning grids teachers can adapt.


      Trigger phrases: "map the curriculum for", "create a pacing guide for the year",
      "build a

      scope and sequence", "align my curriculum to standards", "find gaps in my curriculum",

      "standards coverage map", "year-at-a-glance", "map all standards for", "pacing
      calendar".


      Every map cites verified Florida B.E.S.T. or NGSSS standards. Coverage analysis
      flags any

      state-required standard not addressed in the proposed sequence. Output includes
      an

      instructional-days estimate per unit and a standards-coverage matrix showing
      which standards

      are addressed when.


      Integrates with atom-standards-match (standard resolution), lesson-planner (unit
      breakdowns),

      and quality-review (coverage completeness gate). The completed artifact routes
      to quality-review

      before being marked Approved.


      Do NOT use curriculum-mapping to write individual lesson plans (use lesson-planner).
      Do NOT

      use it to generate assessments (use assessment-designer). Do NOT use it to produce
      IEP-based

      curriculum modifications (use special-education-support).


      Output artifacts: pacing_guide, scope_and_sequence, standards_alignment_matrix,

      curriculum_gap_analysis, year_at_a_glance. Always includes human_review_required:
      true and

      a metadata block with standard codes and coverage percentage.

      '
    parameters:
      type: object
      required:
      - grade
      - subject
      properties:
        grade:
          type: string
          description: 'Grade level or band. Examples: "3rd grade", "9-12", "6-8",
            "Kindergarten", "High School Biology".

            '
        subject:
          type: string
          description: 'Subject area. Examples: "ELA", "Mathematics", "Science", "Social
            Studies", "Algebra 1", "AP Biology", "World History".

            '
        artifact_type:
          type: string
          enum:
          - pacing_guide
          - scope_and_sequence
          - standards_alignment_matrix
          - curriculum_gap_analysis
          - year_at_a_glance
          - unit_sequence
          description: 'Type of curriculum planning artifact. Defaults to pacing_guide.

            '
        time_period:
          type: string
          enum:
          - full_year
          - semester
          - quarter
          - trimester
          - unit
          description: 'Time span the map should cover. Defaults to full_year.

            '
        total_instructional_days:
          type: integer
          description: 'Total instructional days available. Florida K-12 = typically
            180 days. Adjust for assessment windows, holidays, review periods. Defaults
            to 160 (accounting for 20 days lost to testing/non-instructional time).

            '
        standards:
          type: array
          items:
            type: string
          description: 'Standard codes to map. If omitted, the full FL B.E.S.T./NGSSS
            standard set for the grade/subject is used. Provide codes when mapping
            to a specific subset (e.g., only Reading standards, or standards for an
            advanced/honors course).

            '
        course_name:
          type: string
          description: 'Official course name if relevant. Examples: "Algebra 1 Honors",
            "AP Environmental Science", "Grade 3 Mathematics". Used in document headers.

            '
        existing_units:
          type: array
          items:
            type: object
            properties:
              unit_name:
                type: string
              standards_addressed:
                type: array
                items:
                  type: string
              estimated_days:
                type: integer
          description: 'Existing unit sequence to analyze for gaps. Provide to run
            gap analysis against current curriculum. Omit to generate a new sequence
            from scratch.

            '
        district_pacing_constraints:
          type: string
          description: 'District or school pacing requirements (e.g., "FSA writing
            window Feb 1-March 15 — no new content that week", "benchmark assessments
            every 9 weeks"). Informs day allocation.

            '
        assessment_windows:
          type: array
          items:
            type: string
          description: 'Known assessment dates/windows to exclude from instructional
            days. Examples: ["FSA ELA: April 14-18", "District Benchmark: Oct 7-9",
            "EOC: May 12-16"].

            '
        differentiation_notes:
          type: string
          description: 'Notes about differentiation needs across the class (e.g.,
            "25% of students on IEPs in reading", "2 sections are honors, 1 is inclusion").
            Informs pacing recommendations.

            '
        output_format:
          type: string
          enum:
          - markdown_table
          - json
          - narrative_with_table
          description: 'Output format. markdown_table (default) is ready for copy-paste
            into district planning templates. json is machine-readable for further
            processing.

            '
      additionalProperties: false
- type: function
  function:
    name: document_intelligence
    description: 'Parse, extract, and structure content from education-sector documents:
      PDFs, DOCX, HTML

      pages, and scanned images. Produces governed knowledge artifacts: structured
      JSON with

      provenance, section headings, extracted tables, cited page numbers, and an honest

      record of any regions that could not be recovered.


      Trigger phrases: "read this PDF and extract", "parse this document", "what does
      this say",

      "extract the standards from this file", "pull the tables from this report",
      "summarize this

      document", "read this FLDOE guidance document", "ingest this curriculum document",

      "what standards are cited in this file", "extract text from this scanned packet".


      Capability-gated pipeline (shared/docintel/):

      - pdf_hifi: high-fidelity PDF parse with layout and column awareness (requires
      PyMuPDF/pdfplumber)

      - ocr: offline OCR for scanned documents (requires tesseract + pytesseract)

      - ocr_advanced: deep-learning OCR for complex/handwritten layouts (requires
      easyocr/surya)

      - read_any_markitdown: universal format converter via markitdown (15+ formats)

      - local_render: JS-rendered HTML pages via Playwright

      When a capability is absent, the gap is honestly reported and a fallback runs
      if available.


      NEVER fabricates text it cannot recover. Every output includes:

      - human_review_required: true

      - recovery_rate: fraction of document successfully parsed

      - unrecovered_regions: list of pages/sections that could not be read

      - provenance: source URL or filename, extraction timestamp, capability used


      Do NOT use document-intelligence to make educational decisions from a document
      — it extracts

      and structures content, it does not interpret or apply it. Do NOT use it to
      process

      documents containing real student PII without authorization and appropriate
      security measures.

      '
    parameters:
      type: object
      required:
      - document_source
      properties:
        document_source:
          type: string
          description: 'File path, URL, or base64-encoded document content. For URLs:
            the crawler respects robots.txt and uses polite fetch delays. For local
            files: provide the absolute path or filename. For base64: prefix with
            "data:<mimetype>;base64,<content>".

            '
        document_type:
          type: string
          enum:
          - pdf
          - docx
          - xlsx
          - pptx
          - html
          - image_png
          - image_jpg
          - image_tiff
          - text
          - markdown
          - auto_detect
          description: 'Document format. Defaults to auto_detect if not specified.

            '
        extraction_goal:
          type: string
          enum:
          - full_text
          - structured_data
          - tables_only
          - standards_references
          - citations_and_links
          - summary
          - headings_and_outline
          - key_dates_and_deadlines
          - contact_information
          - page_range
          description: 'What to extract. Determines which pipeline stages run. Defaults
            to full_text.

            '
        page_range:
          type: string
          description: 'Page range to extract (e.g. "1-5", "10", "3,7,12-15"). For
            large documents, specify the relevant pages to minimize processing time.

            '
        output_format:
          type: string
          enum:
          - json
          - markdown
          - plain_text
          - structured_tables_json
          description: 'Output format. json (default) includes provenance and metadata.
            markdown is best for display. plain_text strips all markup. structured_tables_json
            extracts tabular data only.

            '
        ocr_enabled:
          type: boolean
          description: 'Enable OCR for scanned/image-based pages. Requires tesseract
            capability. Defaults to true (falls back gracefully if tesseract absent).

            '
        ocr_language:
          type: string
          description: 'Tesseract OCR language code(s). Examples: "eng", "eng+spa",
            "eng+hea" (Haitian Creole). Defaults to "eng".

            '
        standards_corpus:
          type: string
          enum:
          - florida_best
          - florida_ngsss
          - florida_all
          - ccss
          - ngss
          - auto_detect
          description: 'When extraction_goal is standards_references: which standards
            corpus to match against. Defaults to florida_all.

            '
        table_extraction_format:
          type: string
          enum:
          - json_records
          - csv
          - markdown_table
          - html_table
          description: 'For tables_only extraction: output format per table. Defaults
            to json_records.

            '
        include_page_numbers:
          type: boolean
          description: 'Include source page number with each extracted section/paragraph.
            Defaults to true.

            '
        split_by_section:
          type: boolean
          description: 'Split output by document heading/section rather than returning
            flat text. Defaults to true when extraction_goal is full_text or structured_data.

            '
      additionalProperties: false
- type: function
  function:
    name: family_communication
    description: "Draft family-facing communications for K-12 educators: parent emails,\
      \ classroom newsletters,\nconference notes, progress updates, behavior notes,\
      \ celebration messages, and permission forms.\nAll output targets a grade 6-8\
      \ reading level by default (Flesch-Kincaid), is professional in\ntone, uses\
      \ placeholders for all student and family names, and carries human_review_required:\
      \ true\nfor teacher review before sending.\n\nTrigger phrases: \"write a parent\
      \ email about\", \"draft a newsletter for\", \"help me communicate\nwith families\
      \ about\", \"write a note home\", \"draft conference talking points\", \"parent\
      \ letter\nabout\", \"translate this for families\", \"make this easier to read\
      \ for parents\".\n\nIntegrates with atom-parent-comm (single-message drafting)\
      \ and atom-reading-level (reading\nlevel check). Documents with sensitive content\
      \ (behavior, academic concern, special education)\ninclude a plain-language\
      \ \"key message\" summary at the top.\n\nPRIVACY RULES (always enforced):\n\
      - All student names replaced with placeholder \"Student\" or [STUDENT NAME]\n\
      - All family names replaced with \"Family\" or [FAMILY NAME]\n- No real PII\
      \ (SSN, address, phone, ID numbers) in any output\n- Behavior notes use observable,\
      \ non-labeling language only\n- Communications about special education services\
      \ never identify disability category to\n  unauthorized recipients\n\nDo NOT\
      \ use family-communication to produce legally required special education notices\
      \ (Prior\nWritten Notices, Procedural Safeguards) — those require the district's\
      \ official forms. Do NOT\nuse it to draft communications that make eligibility\
      \ or placement decisions.\n"
    parameters:
      type: object
      required:
      - communication_type
      - grade
      properties:
        communication_type:
          type: string
          enum:
          - parent_email
          - classroom_newsletter
          - conference_note
          - conference_talking_points
          - progress_update
          - behavior_note
          - celebration_note
          - permission_form
          - volunteer_request
          - supply_list
          - event_announcement
          - general_letter
          description: 'The type of family communication artifact to produce.

            '
        grade:
          type: string
          description: 'Grade level of the class or student. Examples: "3rd grade",
            "9th grade", "Kindergarten".

            '
        subject:
          type: string
          description: 'Subject area if relevant (e.g. "Math", "ELA"). Omit for whole-class
            communications.

            '
        key_points:
          type: array
          items:
            type: string
          description: 'Main points the communication must convey. Examples: ["upcoming
            field trip on Oct 3", "permission form due by Sept 25", "students need
            $5 for materials"]. The skill drafts fluent prose around these points.

            '
        topic_summary:
          type: string
          description: 'Brief description of what happened or what you want to communicate.
            Use for behavior notes or academic updates. Example: "Student disrupted
            class three times this week by calling out; prior interventions have included
            verbal reminders and proximity."

            '
        tone:
          type: string
          enum:
          - warm
          - professional
          - urgent
          - celebratory
          - neutral
          description: 'Desired tone. Defaults to professional for most types; warm
            for celebration notes.

            '
        reading_level_target:
          type: string
          enum:
          - grade_4_6
          - grade_6_8
          - grade_8_10
          description: 'Target reading level for the output. Defaults to grade_6_8
            (Flesch-Kincaid ~7th grade). Use grade_4_6 for communities where simpler
            language is preferred.

            '
        language:
          type: string
          description: 'Output language code. Defaults to "en". Use "es" for Spanish,
            "ht" for Haitian Creole, etc. Dual-language output (both languages in
            one document) is supported — specify as "en+es".

            '
        newsletter_sections:
          type: array
          items:
            type: string
          description: 'For classroom_newsletter: list of sections to include. Examples:
            ["This Week''s Learning", "Upcoming Events", "Volunteer Opportunities",
            "Star Students", "Reminders"].

            '
        conference_student_strengths:
          type: array
          items:
            type: string
          description: 'For conference notes/talking points: observable academic or
            behavioral strengths to highlight. Placeholders only — no real names.

            '
        conference_growth_areas:
          type: array
          items:
            type: string
          description: 'For conference notes/talking points: areas for growth, stated
            in positive, actionable language.

            '
        conference_action_items:
          type: array
          items:
            type: string
          description: 'For conference notes: agreed next steps for teacher and/or
            family. Example: ["Teacher will provide reading log template", "Family
            will ensure student reads 20 min/night", "Follow-up call in 4 weeks"].

            '
        include_translation_note:
          type: boolean
          description: 'If true, add a footer note in English and the target language
            that a translation was AI-assisted and the family can request clarification.
            Recommended for non-English output.

            '
          default: true
      additionalProperties: false
- type: function
  function:
    name: feed_curator
    description: "Manage the TOS RSS/Atom feed catalog: validate existing feeds for\
      \ health (dead links,\nredirects, stale content, wrong labels), discover new\
      \ feed candidates from authoritative\neducation sources, propose a human-reviewable\
      \ change set, and apply only mechanically-safe\nrepairs automatically. Every\
      \ change is appended to ledger/feeds-change-log.json for audit\nand revert.\n\
      \nTrigger phrases: \"validate the feed catalog\", \"find new education feeds\"\
      , \"check for broken\nfeed links\", \"propose feed repairs\", \"update the seed\
      \ catalog\", \"add a new feed source\",\n\"check which feeds are dead\", \"\
      curator status\", \"revert a feed change\", \"auto-repair feeds\".\n\nFeed catalog\
      \ tiers:\n- canonical: primary government/standards sources (FLDOE, CPALMS,\
      \ FL Legislature, WIDA) —\n  the ONLY tier that can confirm a standards/policy\
      \ change\n- news_teacher_student: curated news on issues affecting teachers\
      \ and students (secondary)\n- product_updates: edtech/vendor feeds — OFF by\
      \ default, opt-in only\n\nAuto-apply rules (safe, logged, reversible):\n- Remove\
      \ confirmed 404/410 dead feeds\n- Follow verified 301/302 redirects to new URL\n\
      Everything else (new feeds, relabeling, removals beyond dead links) = human-approved\
      \ proposals.\n\nAll changes append to ledger/feeds-change-log.json:\n{ts, feed_id,\
      \ action, before, after, reason, source, mode: auto|approved}\nRevert via --revert\
      \ <entry_id> replays the log backwards.\n\nDo NOT use feed-curator to harvest\
      \ or process feed items (use tools/feeds_update.py for that).\nDo NOT approve\
      \ removal of a canonical-tier feed without verifying the source has moved or\n\
      closed on the primary site. human_review_required: true on all proposals.\n"
    parameters:
      type: object
      required:
      - action
      properties:
        action:
          type: string
          enum:
          - validate_catalog
          - discover_feeds
          - propose_repairs
          - apply_safe_repairs
          - apply_approved_proposal
          - status_report
          - revert
          - update_baseline
          description: 'Action to perform. validate_catalog: health-check every feed
            in feeds.json (404, redirect, staleness, label accuracy) — returns a per-feed
            status table. discover_feeds: search for new feed candidates from a seed
            URL or topic. propose_repairs: generate a human-reviewable change set
            (add/remove/repair/relabel) with reason + source + confidence for each
            entry. apply_safe_repairs: auto-apply only 404/redirect fixes from the
            current proposal; log every change to ledger. apply_approved_proposal:
            apply a human-approved proposal file; log all changes. status_report:
            quick summary of catalog health (N feeds, N due, N unreachable, N uncertain).
            revert: undo a previous change by log entry ID. update_baseline: after
            human approval, record new etag/sha256 baselines for a feed.

            '
        seed_url:
          type: string
          description: 'For discover_feeds: URL of an authoritative education page
            to mine for RSS/Atom links (e.g. "https://www.fldoe.org/newsroom"). The
            crawler respects robots.txt.

            '
        discovery_topic:
          type: string
          description: 'For discover_feeds: topic to search for feeds (e.g. "Florida
            DOE news", "OCPS district updates", "WIDA ELL standards", "education legislation
            Florida 2026").

            '
        proposal_file:
          type: string
          description: 'For apply_approved_proposal: path to the approved proposal
            JSON file produced by propose_repairs.

            '
        audit_log_entry_id:
          type: string
          description: 'For revert: the entry ID from ledger/feeds-change-log.json
            to undo.

            '
        feed_id:
          type: string
          description: 'For update_baseline or targeted validate_catalog: specific
            feed ID to operate on. If omitted, operates on all feeds in the catalog.

            '
        tier_filter:
          type: string
          enum:
          - canonical
          - news_teacher_student
          - product_updates
          - all
          description: 'For validate_catalog and status_report: limit to a specific
            tier. Defaults to all.

            '
        include_product_updates_tier:
          type: boolean
          description: 'For discover_feeds: whether to surface product_updates tier
            candidates. Defaults to false (off by default per design).

            '
          default: false
      additionalProperties: false
- type: function
  function:
    name: intervention_mtss
    description: "Design Tier 1, Tier 2, and Tier 3 MTSS/RTI intervention plans, progress-monitoring\
      \ protocols,\nand data-review meeting tools for K-12. Every plan includes a\
      \ specific, measurable\nprogress-monitoring measure and decision rules (what\
      \ data triggers a tier change). Plans are\nevidence-based and cite the research\
      \ base for recommended interventions.\n\nTrigger phrases: \"write a Tier 2 intervention\
      \ plan\", \"create an MTSS plan for\", \"design an\nRTI support plan\", \"help\
      \ with progress monitoring\", \"data review protocol\", \"what intervention\n\
      should I use for\", \"write a behavior intervention plan\", \"Tier 3 intensive\
      \ support for\",\n\"progress monitoring schedule\".\n\nTier 1: universal, whole-class,\
      \ core instruction adjustments with built-in differentiation.\nTier 2: targeted\
      \ small-group supplemental intervention, typically 3x/week 20-30 min.\nTier\
      \ 3: intensive individualized intervention, data-driven, usually daily.\n\n\
      Progress-monitoring is REQUIRED: every plan specifies the tool (CBM, DIBELS,\
      \ AIMSweb, teacher-\nmade probe), frequency (weekly/biweekly), goal line, and\
      \ decision rule (when to intensify,\ncontinue, or fade the intervention).\n\n\
      Integrates with atom-standards-match (standards alignment for academic interventions),\n\
      atom-differentiate (differentiation layers), assessment-designer (progress monitoring\
      \ probes),\nand quality-review. Routes to special-education-support when IDEA\
      \ eligibility is the question.\n\nIMPORTANT BOUNDARIES:\n- MTSS/RTI is a general\
      \ education process; this skill does NOT determine special education\n  eligibility\
      \ — that requires evaluation by qualified school psychologist / evaluation team\n\
      - Never recommend a specific student for special education referral as a plan\
      \ output\n- Progress data must be teacher-supplied — never fabricated\n- human_review_required:\
      \ true on all outputs\n\nDo NOT use intervention-mtss to write IEP goals (use\
      \ special-education-support). Do NOT use\nit to determine eligibility. Do NOT\
      \ use it for disciplinary interventions unrelated to\nacademic or behavioral\
      \ support (use school-administration).\n"
    parameters:
      type: object
      required:
      - tier
      - concern_area
      - grade
      properties:
        tier:
          type: string
          enum:
          - tier_1
          - tier_2
          - tier_3
          description: 'MTSS tier. tier_1 = universal core adjustments; tier_2 = targeted
            small-group supplemental; tier_3 = intensive individualized.

            '
        concern_area:
          type: string
          enum:
          - reading_decoding
          - reading_fluency
          - reading_comprehension
          - math_computation
          - math_problem_solving
          - writing
          - behavior_academic_engagement
          - behavior_social_emotional
          - attendance
          - language_development
          - executive_function
          description: 'Primary area of concern the intervention addresses.

            '
        grade:
          type: string
          description: 'Student or group grade level. Examples: "2nd grade", "6th
            grade", "9th grade".

            '
        subject:
          type: string
          description: 'Academic subject if concern_area is academic. Examples: "ELA",
            "Mathematics".

            '
        student_profile_description:
          type: string
          description: 'Anonymous description of the student''s current performance
            level, strengths, and prior interventions tried. Use "the student" or
            placeholder names — never real names. Examples: "The student reads at
            a late-1st grade level in 3rd grade; prior classroom differentiation and
            partner reading have not moved the needle."

            '
        current_performance_data:
          type: string
          description: 'Current assessment data: scores, rates, levels. Examples:
            "ORF: 42 wcpm (grade 3 goal 90 wcpm)", "Math facts: 8/min addition (goal
            20/min)", "ODRs: 3 per week (goal: 0-1)". If no data yet, use "[INSERT
            BASELINE DATA]" — never fabricate.

            '
        intervention_frequency_per_week:
          type: integer
          description: 'Number of intervention sessions per week. Typical: Tier 2
            = 3-4, Tier 3 = 5. If omitted, defaults to standard for the tier.

            '
        intervention_duration_minutes:
          type: integer
          description: 'Duration of each intervention session in minutes. Typical:
            20-30 min for Tier 2, 30-45 min for Tier 3.

            '
        intervention_setting:
          type: string
          enum:
          - small_group
          - individual
          - whole_class
          - pull_out
          - push_in
          - co_taught
          description: 'Intervention delivery setting. Defaults based on tier if omitted.

            '
        evidence_based_programs_available:
          type: array
          items:
            type: string
          description: 'Evidence-based programs available at the school (e.g. ["Fundations",
            "Read Naturally", "Zearn", "Check-In Check-Out"]). The plan recommends
            from this list when available; cites research base for alternatives when
            not.

            '
        progress_monitoring_tool:
          type: string
          description: 'Specific progress-monitoring tool available (e.g. "DIBELS
            8th Ed", "AIMSweb Plus", "easyCBM", "teacher-made running record"). If
            omitted, skill recommends an appropriate tool with a citation.

            '
        goal_line:
          type: string
          description: 'Target performance criterion at the end of the intervention
            period. Examples: "60 wcpm by 12 weeks", "90% accuracy on addition facts
            by 8 weeks". If omitted, a research-normed goal is drafted with a placeholder.

            '
        decision_rule_weeks:
          type: integer
          description: 'How many data points (weeks) before a tier-change decision
            is made. Typical: 6-8 for Tier 2, 4-6 for Tier 3. Defaults to 8.

            '
        include_data_review_protocol:
          type: boolean
          description: 'If true, include a data-review meeting protocol (agenda, data
            display recommendations, decision-making framework). Defaults to true
            for Tier 2 and Tier 3.

            '
        co_teacher_present:
          type: boolean
          description: 'True if a co-teacher is in the room. Affects delivery model
            recommendations.

            '
      additionalProperties: false
- type: function
  function:
    name: lesson_planner
    description: 'Design and produce standards-aligned K-12 lesson plans, unit plans,
      pacing guides, daily

      agendas, warm-ups, and exit tickets. Every item ties to a verified Florida B.E.S.T.
      or NGSSS

      standard (or the state/standard set the teacher provides). Outputs are differentiation-ready

      and always carry human_review_required: true before classroom use.


      Trigger phrases: "write me a lesson plan", "plan a unit on", "make a pacing
      guide", "I need a

      warm-up for", "create an exit ticket", "build a week of lessons", "design a
      lesson for".


      Supports all grade bands (K–12) and all Florida core + elective subjects. Integrates
      with

      atom-standards-match (to resolve standard codes), atom-objective-write (SWBAT
      objectives),

      atom-activity-generate (individual activities), and atom-differentiate (differentiation
      layers).

      Routes completed artifact to quality-review before marking final.


      Do NOT use lesson-planner to write IEP goals, accommodation plans, or progress-monitoring

      tools (use special-education-support). Do NOT use it to design cumulative assessments
      or

      rubrics that are the primary artifact (use assessment-designer).


      Output artifacts: lesson_plan, unit_plan, daily_agenda, pacing_guide, warm_up,
      exit_ticket.

      Always outputs a metadata block with standard codes, author, date, human_review_required:
      true.

      Nothing is Final until it passes the Quality Gates (quality-review).

      '
    parameters:
      type: object
      required:
      - grade
      - subject
      - topic
      properties:
        grade:
          type: string
          description: 'Grade level or band. Examples: "3rd grade", "Grade 5", "6-8",
            "9-12", "Kindergarten".

            '
        subject:
          type: string
          description: 'Subject area. Examples: "ELA", "Mathematics", "Science", "Social
            Studies", "Biology", "Algebra 1", "US History", "Spanish 1", "Physical
            Education", "Art".

            '
        topic:
          type: string
          description: 'Specific topic or concept for the lesson or unit. Examples:
            "photosynthesis", "fractions greater than 1", "civil rights movement",
            "argumentative writing".

            '
        artifact_type:
          type: string
          enum:
          - lesson_plan
          - unit_plan
          - daily_agenda
          - pacing_guide
          - warm_up
          - exit_ticket
          - weekly_plan
          description: 'Type of planning artifact to produce. Defaults to lesson_plan
            if not specified.

            '
        lesson_duration_minutes:
          type: integer
          description: 'Length of the lesson in minutes. Common values: 45, 50, 60,
            90. Defaults to 50 if omitted.

            '
        standards:
          type: array
          items:
            type: string
          description: 'Florida B.E.S.T. or NGSSS standard codes to align to (e.g.
            ["LAFS.4.RI.1.1", "MAFS.5.NF.1.1"]). If omitted, atom-standards-match
            is called automatically based on grade/subject/topic.

            '
        learning_objectives:
          type: array
          items:
            type: string
          description: 'Pre-written SWBAT objectives. If omitted, atom-objective-write
            is called to generate them from the standards.

            '
        differentiation_profiles:
          type: array
          items:
            type: string
            enum:
            - ell
            - iep
            - gifted
            - '504'
            - below_grade
            - above_grade
          description: 'Differentiation layers to embed. atom-differentiate is called
            for each profile to generate modifications that keep the learning target
            constant.

            '
        materials:
          type: array
          items:
            type: string
          description: 'Available materials (e.g. ["Chromebooks", "whiteboards", "base-ten
            blocks"]). Informs activity generation; omit if no constraints.

            '
        unit_weeks:
          type: integer
          description: 'For unit_plan or pacing_guide: number of weeks. Ignored for
            single lesson artifacts.

            '
        language:
          type: string
          description: 'Output language. Defaults to "en" (English). Use "es" for
            Spanish dual-language contexts.

            '
        additional_context:
          type: string
          description: 'Any additional teacher context: prior unit knowledge, classroom
            setup, co-teacher present, testing schedule constraints. Never include
            real student names or PII.

            '
      additionalProperties: false
- type: function
  function:
    name: meeting_classifier
    description: 'Classify an educator meeting from contextual clues and route it
      to the right TOS skill. Reads

      a description or brief excerpt from a meeting context and determines meeting
      type with

      confidence score. When two meeting types are plausible within 10 confidence
      points, emits a

      minority report showing both options and asks for clarification.


      Trigger phrases: "what kind of meeting is this", "classify this meeting", "I''m
      not sure which

      skill to use for my meeting", "is this an IEP or a 504", "what should I prepare
      for this

      meeting", "route this meeting".


      Classifies into: IEP_meeting, 504_meeting, MTSS_RTI_meeting, parent_teacher_conference,

      PLCteam_meeting, data_review, professional_development, administrative_observation,

      discipline_hearing, transition_planning, manifestation_determination, general_staff_meeting,

      department_meeting, school_board_meeting, crisis_response.


      Routes to: special-education-support (IEP, 504, transition, manifestation),
      intervention-mtss

      (MTSS/RTI, data review), family-communication (conference prep), professional-learning
      (PLC,

      PD), school-administration (admin observation, discipline, board), teacher-core
      (ambiguous).


      LEGAL BOUNDARIES:

      - Never determines IEP or 504 eligibility from meeting context

      - Never interprets legal status of a meeting

      - Ambiguous classification always surfaces a minority report rather than guessing

      - human_review_required: true on every output


      Do NOT use meeting-classifier to produce meeting artifacts (use the routed skill).
      Do NOT use

      it to make eligibility or placement determinations.

      '
    parameters:
      type: object
      required:
      - meeting_context
      properties:
        meeting_context:
          type: string
          description: 'Description of the meeting, participants, purpose, or a brief
            excerpt from a meeting invitation, agenda, or notes. The richer the context,
            the more confident the classification. Examples: "Annual IEP review for
            a 4th grader with SLD; team includes parent, gen ed teacher, sped teacher,
            school psych" or "Principal wants to observe my class next Tuesday for
            my formal eval".

            '
        participants:
          type: array
          items:
            type: string
          description: 'List of participant roles present (not names). Examples: ["parent",
            "general ed teacher", "special education teacher", "school psychologist",
            "principal", "district ESE coordinator", "student"]. Helps distinguish
            IEP from 504 from MTSS.

            '
        trigger_document:
          type: string
          description: 'Name of a document that triggered the meeting, if known. Examples:
            "annual IEP review", "progress monitoring data showing insufficient response",
            "discipline referral", "parent request letter".

            '
        grade:
          type: string
          description: 'Student or teacher grade/level if relevant. Helps narrow routing.

            '
        subject:
          type: string
          description: 'Subject area if relevant (e.g., for a data review of math
            scores).

            '
        output_format:
          type: string
          enum:
          - classification_and_routing
          - classification_only
          - routing_only
          - full_report_with_minority
          description: 'What to return. classification_and_routing (default) gives
            the meeting type, confidence, and recommended TOS skill. full_report_with_minority
            always includes the minority report showing alternative classifications
            with confidence deltas.

            '
        force_minority_report:
          type: boolean
          description: 'If true, always emit the minority report showing all plausible
            classifications with confidence scores, even when one type clearly dominates.

            '
      additionalProperties: false
- type: function
  function:
    name: output_validator
    description: 'Validate TOS-generated JSON artifacts against their JSON Schema
      and a governance rule catalog

      (no fabrication, no real PII, metadata block present, human_review_required:
      true, standard

      codes verified). Also validates Office documents and PDFs for structural integrity.
      Promotes

      failing cases to regression evals when requested.


      Use output-validator AFTER an artifact is generated and BEFORE it goes to quality-review.

      It catches structural and governance failures early — quality-review handles
      pedagogical

      scoring. Together they form the TOS validation pipeline:

      Generation → output-validator (schema + governance) → quality-review (9-dimension
      scoring)

      → Approved / Revision Required / Rejected.


      Trigger phrases: "validate this artifact", "check the schema", "does this JSON
      conform",

      "governance check", "check for PII", "verify the metadata block", "is the standard
      code

      real", "validate this document structure", "pre-flight check on this output".


      Runs: tools/validate_outputs.py (schema + governance) and tools/validate_document.py

      (Office/PDF structural integrity). Both are stdlib-compatible; capability improvements

      come from pdf_hifi and office_authoring when installed.


      Output: validation_result (pass/fail/warn), violations list with field paths
      and

      corrective actions, governance_flags (PII risk, missing metadata, unverified
      standard codes),

      and human_review_required: true.


      Do NOT use output-validator to score pedagogical quality (use quality-review).
      Do NOT use

      it to generate artifacts (it validates, never generates). Do NOT use it on student-submitted

      work — it validates TOS-generated educator artifacts only.

      '
    parameters:
      type: object
      required:
      - artifact
      properties:
        artifact:
          type: string
          description: 'The artifact to validate. Accepts JSON string, markdown text,
            or base64-encoded binary (for Office/PDF structural validation). For JSON:
            the full artifact JSON. For documents: the file content encoded as "data:<mimetype>;base64,<content>".

            '
        schema_type:
          type: string
          enum:
          - lesson_plan
          - unit_plan
          - assessment
          - rubric
          - iep_goal
          - accommodation_plan
          - pacing_guide
          - curriculum_map
          - parent_communication
          - professional_learning
          - health_report
          - repair_plan
          - feed_currency_brief
          - standards_update_brief
          - metadata_block_only
          - generic_governed_artifact
          - office_document
          - pdf_document
          description: 'Schema to validate against. Determines which JSON Schema rules
            and governance rules apply. Use generic_governed_artifact when the specific
            type is unknown.

            '
        validation_mode:
          type: string
          enum:
          - full
          - governance_only
          - schema_only
          - no_pii_check_only
          - structural_only
          description: 'full (default): runs all checks — schema conformance, governance
            rules, PII scan, standard code verification. governance_only: checks metadata
            block, human_review flag, no-fabrication markers. schema_only: JSON Schema
            conformance only. structural_only: for Office/PDF — checks document structure,
            no text content analysis.

            '
        standards_to_verify:
          type: array
          items:
            type: string
          description: 'Standard codes the artifact claims to cite. Validator checks
            each against the FL standards corpus. If omitted, codes are extracted
            from the artifact automatically.

            '
        promote_to_eval:
          type: boolean
          description: 'If true and validation fails, register the artifact + violation
            set as a regression eval case in the eval catalog. Defaults to false.

            '
        strict_mode:
          type: boolean
          description: 'If true, any governance warning (not just violation) fails
            validation. Use for high-stakes artifacts (IEP documents, formal communications).
            Defaults to false.

            '
        pii_scan_depth:
          type: string
          enum:
          - surface
          - deep
          - name_pattern_only
          description: 'How thoroughly to scan for PII. surface (default): regex patterns
            for SSN, phone, email, student ID formats. deep: also checks for name
            patterns and contextual PII (e.g., "Student at [specific school] with
            [specific identifier]"). name_pattern_only: fastest — checks for proper
            name patterns only.

            '
      additionalProperties: false
